- joke_id: s01e07_b1_beat1_tag
  text: 'You know how it works. They got the leisure police. They pull up in front
    of the old people''s house with a golf cart, jump out, "Let''s go Pop, white belt,
    white pants, white shoes, get in the back. Drop the snow shovel right there, drop
    it!"

    '
  setup_expectation: '"That''s the law" has established the reframe (retirement as
    legal mandate). The audience expects Jerry to move on or perhaps add a brief tag.
    Instead he commits fully to the fictional world where retirement-to-Florida is
    enforced.

    '
  punchline_violation: 'Jerry builds out an entire enforcement apparatus: "leisure
    police" who arrive in golf carts, issue commands about retiree dress code (white
    belt, white pants, white shoes), and force the surrender of northern-climate tools
    ("drop the snow shovel"). The police-arrest framework — arriving at the house,
    barking orders, demanding compliance — is systematically applied to the benign
    act of retirement. Every detail is a law-enforcement trope transplanted into the
    leisure domain: the vehicle (golf cart for squad car), the uniform mandate (retiree
    whites for prison jumpsuits), the contraband seizure (snow shovel for weapons).

    '
  pivot_locus: logical
  pivot_concept: florida_retirement
  pivot_mechanism:
    operation: transplant
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: escalation
  difficulties: 'The operation choice between transplant and extension is the main
    tension. Extension would say: accepted premise (retirement is law), absurd-but-logical
    conclusion (there must be enforcement). That reading has merit — this IS the logical
    consequence of the "law" premise. However, the humor does not primarily come from
    where the logic leads; it comes from the MISMATCH between the arrest framework
    and the retirement context. The specific substitutions (golf cart for squad car,
    white belt for handcuffs) are what generate the laughs, and those are transplant
    artifacts — they depend on the imported framework not fitting. If the framework
    genuinely fit the target domain, the joke would not work. That is the transplant
    test. The template choice of escalation over mundane_as_monumental reflects that
    the bit builds through accumulating details rather than sustaining a single frame
    mismatch.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: authority
    character_register: bureaucratic
    register_gap: treats_mundane_as_serious
    character_gloss: The 'leisure police' barking orders at retirees with law-enforcement
      urgency — mandating white belts, white pants, confiscating snow shovels — enforcing
      Florida retirement as if it were an arrest
- joke_id: s01e07_b2_beat1_punchline
  text: 'I am not much for the family gathering. You know, you sit there, and the
    conversation''s so boring. It''s so dull. And you start to fantasize. You know,
    you think, what if I just got up and jumped out that window? What would it be
    like? Just crashed right through the glass..

    '
  setup_expectation: '"You start to fantasize" at a boring family gathering sets up
    a daydream frame. The audience expects a mild escapist fantasy — being somewhere
    else, imagining a better scenario, mentally checking out. "Fantasize" conventionally
    implies pleasant distraction.

    '
  punchline_violation: 'The fantasy is violent self-defenestration. Rather than imagining
    being at a bar or on a beach, the boredom is so extreme that the escape fantasy
    involves bodily harm — crashing through glass. The scale of the response (physical
    destruction, potential injury) is grotesquely disproportionate to the stimulus
    (dull conversation). The violation is in the extremity of the boredom response.

    '
  pivot_locus: both
  pivot_concept: family_gathering_boredom
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_premise
  primary_template: escalation
  difficulties: 'The operation choice between extension and negation is the key question.
    Negation would say: setup implies fantasies are pleasant, punchline asserts a
    violent fantasy. But the humor is not in contradicting the idea of fantasy — it
    is in FOLLOWING the boredom premise to its extreme conclusion. The boredom is
    accepted; the escape impulse is accepted; the joke pushes them further than expected.
    That is extension''s signature. The pivot_locus is "both" because the joke works
    logically (disproportionate response) AND affectively (the audience genuinely
    recognizes the desperation of family-gathering boredom). Scale_shift is expansion
    because the jump from "bored" to "defenestration" is a scope increase that is
    load-bearing.

    '
  physical_performance: null
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s01e07_b2_beat1_tag
  text: 'Come back in, there''s broken glass, everybody''s all upset. "No, I''m alright.
    I was just a little bored, there. No, I''m fine. I came back. I wanted to hear
    a little about that Hummel collection, Aunt Rose. Let''s pick it up right there."

    '
  setup_expectation: 'Having just crashed through a window — an act of dramatic, destructive
    escape — the audience expects consequences: injury, alarm, a trip to the hospital,
    or at minimum an acknowledgment that something extraordinary happened. The scenario
    has escalated to physical destruction; the expected trajectory is further escalation
    or resolution of the crisis.

    '
  punchline_violation: 'Jerry casually returns, dismisses the alarm ("I was just a
    little bored"), and asks to resume the exact conversation he violently fled. The
    crisis is deflated to nothing. The phrase "a little bored" is bathetic understatement
    for an act that involved crashing through glass. And the request to hear about
    Aunt Rose''s Hummel collection — the most stereotypically tedious family-gathering
    topic imaginable — negates the entire premise of escape. He didn''t escape; he
    came back for more of the very thing that drove him out. The Hummel collection
    is the perfect specificity choice: it concretizes "boring family conversation"
    in the most recognizable possible way.

    '
  pivot_locus: both
  pivot_concept: family_gathering_boredom
  pivot_mechanism:
    operation: negation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_anomaly
  primary_template: mundane_as_monumental
  difficulties: 'The template choice is the hardest call here. A case exists for reductio:
    the logical chain would be "if you''re bored enough to jump through a window,
    but the injury is minor, you''d have to come back and sit through it anyway —
    making the escape pointless." But the joke does not present an argumentative chain;
    it presents a scenario and a reaction. Mundane_as_monumental better captures the
    rhetorical shape: the casual treatment of the extraordinary situation. The operation
    choice between negation and reinterpretation is cleaner: the escape IS negated
    (he comes back), not merely reframed. The scale_shift contraction captures the
    bathetic understatement that is independently load-bearing.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: casual
    register_gap: treats_serious_as_mundane
    character_gloss: Jerry-as-character returning through the broken window, casually
      dismissing the violent defenestration as being 'a little bored' and earnestly
