- joke_id: s01e07_b1_beat1_punchline
  text: 'My parents live in Florida now. They moved there last year. They didn''t
    want to move to Florida, but they''re in their sixties, and that''s the law.

    '
  setup_expectation: '"They didn''t want to move to Florida, but..." sets up a standard
    explanatory frame. The audience expects a real-world reason — health, climate,
    cost of living, proximity to family. The "but" signals a concession to some practical
    force.

    '
  punchline_violation: 'The reason is "that''s the law." The universal cultural observation
    that older Americans retire to Florida is reframed as a literal legal mandate.
    A voluntary demographic pattern is treated as compulsory statute. The comedy is
    in replacing the soft social norm with the hard machinery of legal obligation.

    '
  pivot_locus: logical
  pivot_concept: florida_retirement
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_convention
  primary_template: mundane_as_monumental
  difficulties: 'The main tension is between reinterpretation and transplant. A case
    could be made for transplant: the legal/regulatory framework (source domain) is
    being applied to a lifestyle choice (target domain), and the mismatch is the joke.
    However, Jerry does not develop the legal framework as a foreign system being
    imported — he simply relabels the pattern as "the law" in a single move. There
    is no elaborated source-domain apparatus (no statute number, no penalty, no courtroom).
    The joke operates by reframing one thing (the retirement pattern) under a different
    concept (legal compulsion), not by importing and applying an entire foreign framework.
    The next laugh-point IS that elaboration, making this one the reframe and the
    next one the transplant.

    '
