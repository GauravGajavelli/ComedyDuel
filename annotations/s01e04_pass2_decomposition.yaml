jokes:
- joke_id: seinfeld_s01e04_opening_01
  transcript_segment: 'Most men like working on things, tools, objects, fixing things...
    They just come wandering out of the house like zombies.

    '
  setup_expectation: 'The setup establishes that men enjoy working with tools and
    are drawn to watch a neighbor using tools in his driveway. The audience expects
    a description of normal neighborly interest or masculine bonding — a socially
    recognizable, voluntary behavior.

    '
  punchline_violation: '"Like zombies" reframes the voluntary, conscious interest
    as an involuntary, mindless compulsion. Men don''t choose to go look; they are
    drawn out by a force they cannot resist, shambling without agency. The humor is
    in the aptness of the parallel — the audience recognizes the zombie-like quality
    of the behavior.

    '
  pivot_locus: logical
  pivot_concept: involuntary_male_compulsion_toward_tools
  pivot_mechanism:
    operation: mapping
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'mapping vs. mundane_as_monumental tension: The pivot operation is
    mapping (zombie comparison reveals an apt parallel), but the template is mundane_as_monumental
    (trivial behavior given supernatural gravity). These sit at different schema layers
    (operation vs. template) so they coexist cleanly, but the zombie image does double
    duty — it''s both the vehicle of the mapping AND the source of the elevated register.

    '
