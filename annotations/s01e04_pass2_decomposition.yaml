- joke_id: seinfeld_s01e04_opening_05
  transcript_segment: 'But if they don''t cut those holes - we are climbing those
    fences. Right over there. "What are you using the steel girders down there? Yeah,
    that''ll hold."

    '
  setup_expectation: 'The previous joke established peepholes as the concession that
    keeps men contained. The implicit frame is that the peepholes are sufficient —
    the system works. Men peek, they''re satisfied.

    '
  punchline_violation: '"We are climbing those fences" extends the compulsion past
    the containment system — if the concession is removed, men will breach the perimeter
    entirely. The escalation from peeking through holes to scaling fences intensifies
    the compulsion to absurd levels. The tag — "What are you using the steel girders
    down there? Yeah, that''ll hold" — callbacks the Philips head question from Joke
    3 but now scaled up to construction-grade materials, AND adds a mock-expert evaluation
    ("Yeah, that''ll hold") that deepens the self-delusion of involvement.

    '
  pivot_locus: logical
  pivot_concept: involuntary_male_compulsion_toward_tools
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_sequence
  primary_template: escalation
  difficulties: 'The tag ("What are you using the steel girders...") is doing multiple
    things simultaneously: (1) callbacks Joke 3''s Philips head question (narrative
    callback), (2) escalates the specificity from household tool to industrial material,
    and (3) adds "Yeah, that''ll hold" — a mock-expert evaluation that extends the
    self-delusion. The "that''ll hold" moment could be read as its own micro-pivot
    (articulation of male pseudo-expertise) or as part of the escalation structure.
    I treated the tag as part of the escalation template rather than as a separate
    joke, since it doesn''t have an independent setup. setup_frame: establishes_sequence
    was chosen because the joke depends on the prior sequence of containment/concession,
    not on establishing a standalone norm. This is the one setup_frame value I was
    least confident about — establishes_norm could also apply if you read "fences
    have peepholes" as the established norm being violated by "no peepholes → climbing."

    '
  physical_performance: null
  act_out:
    present: true
    character_type: expert
    character_register: confident
    register_gap: unaware_of_absurdity
    character_gloss: 'Jerry voices a man who has climbed a construction site fence
      and now offers a mock-expert assessment of the materials: "What are you using
      the steel girders down there? Yeah, that''ll hold." The character is the same
      performed expert from joke 3, now escalated to construction-grade materials.
      The confident register ("Yeah, that''ll hold" — an assured structural evaluation)
      combined with the absurdity of an uninvited trespasser offering engineering
      opinions creates the register gap of unaware_of_absurdity. The character has
      no idea his pseudo-expertise is transparently ludicrous.

      '
