- joke_id: seinfeld_s01e04_opening_02
  transcript_segment: 'Men, it''s true, men hear a drill, it''s like a dog whistle.
    Just.. you know, they go running up to that living room curtain, "Honey, I think
    Jim''s working on something over there."

    '
  setup_expectation: 'Continuing the premise that men are drawn to tool activity.
    The audience expects further description of this behavior. "Men hear a drill"
    sets up a human response to a sound.

    '
  punchline_violation: '"It''s like a dog whistle" maps men''s response to a drill
    onto a dog''s involuntary response to an ultrasonic frequency. This degrades men
    from conscious agents to animals responding to a stimulus they can''t resist.
    The tag — running to the curtain and announcing excitedly to "Honey" — provides
    the articulated recognition beat: the audience has seen or been this exact person.

    '
  pivot_locus: logical
  pivot_concept: involuntary_male_compulsion_toward_tools
  pivot_mechanism:
    operation: mapping
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: shared_recognition
  difficulties: 'Template choice was between mundane_as_monumental and false_equivalence.
    The dog whistle comparison is explicitly equating men = dogs, which is the false_equivalence
    shape (two unequal things treated as equivalent). mundane_as_monumental would
    focus on the elevated-register framing, but the joke''s shape is more about the
    pairing than about elevation. The tag ("Honey, I think Jim''s working on something")
    operates as articulation — pure recognition humor — but is a tag on a mapping-pivoted
    joke, not a separate joke. This is a place where primary_template vs. tag mechanism
    creates a layered structure the schema handles through has_tag/tag_function rather
    than through template.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: earnest
    register_gap: treats_mundane_as_serious
    character_gloss: 'Jerry voices the man running to the living room curtain and
      breathlessly reporting to his wife: "Honey, I think Jim''s working on something
      over there." The character is an everyman (a regular suburban husband) speaking
      with earnest excitement, as though a neighbor using a drill is a noteworthy
      event requiring immediate domestic announcement. The register gap is treats_mundane_as_serious
      because the character applies genuine emotional investment to the trivial observation
      that a neighbor is doing routine work.

      '
- joke_id: seinfeld_s01e04_opening_03
  transcript_segment: 'Now they don''t actually help the guy. No, they just want to
    hang around the area where work is being done... We want to watch the guy, we
    want to talk to him, we want to ask him dumb questions. "What are you using, the
    Philips head?" You know, we feel involved.

    '
  setup_expectation: 'Having established men are drawn to tool work, the audience
    might expect these men to participate — to help, to contribute, to bond through
    shared labor. The setup begins to dismantle this: "they don''t actually help."

    '
  punchline_violation: 'The punchline reveals that men''s desire is not to participate
    but merely to be NEAR the work. The specific dumb question ("What are you using,
    the Philips head?") crystallizes the pathetic nature of the proximity — the question
    is not useful, it''s a pretense of involvement. "We feel involved" is the devastating
    summary: the entire behavior is self-delusion about participation. The humor is
    primarily in articulation — the audience KNOWS this question, has asked or heard
    it, and the act of naming it is the joke.

    '
  pivot_locus: logical
  pivot_concept: male_pseudo_participation
  pivot_mechanism:
    operation: articulation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_behavior
  primary_template: shared_recognition
  difficulties: 'The pivot_mechanism.operation choice between articulation and reinterpretation
    was close. There IS a reframe element: the setup implies men go to the neighbor
    to engage with the work, and the punchline reframes it as engagement-theater.
    But the test for articulation ("would it still be funny if you knew?") clearly
    passes — the Philips head line is funny because of recognition, not surprise.
    The "we feel involved" tag has a slight scale_shift (contraction — the grand magnetic
    compulsion from earlier jokes is deflated to pathetic self-delusion), but this
    is more the tag''s function than the joke''s primary pivot mechanism. Chose not
    to mark scale_shift: contraction because the contraction is in the tag, not in
    the core punchline. (Note: the vocabulary file uses this exact joke as the positive
    example for articulation.)

    '
  physical_performance: null
  act_out:
    present: true
    character_type: expert
    character_register: confident
    register_gap: unaware_of_absurdity
    character_gloss: 'Jerry voices the man who has wandered over to the neighbor''s
      work area and asks a pseudo-knowledgeable question: "What are you using, the
      Philips head?" The character is an expert — someone performing technical knowledge
      to feel involved. The register is confident (an assured, declarative question
      implying familiarity with tools), and the register gap is unaware_of_absurdity
      because the character genuinely believes this dumb question constitutes meaningful
      participation, when it is transparent pseudo-expertise that contributes nothing.

      '
- joke_id: seinfeld_s01e04_opening_04
  transcript_segment: 'That''s why when they have construction sites, they have to
    have those wood panel fences around it, that''s just to keep the men out. They
    cut those little holes for us so we can see what the hell is going on.

    '
  setup_expectation: 'Construction site fences are understood as safety barriers —
    they protect passersby from falling debris and protect the construction zone from
    interference. The peepholes are a known feature. The audience holds the "safety/liability"
    frame.

    '
  punchline_violation: 'The fences are reframed from safety barriers to male-containment
    systems. Their purpose is not to protect people from construction hazards but
    to protect construction from men''s irresistible urge to be near work. The peepholes
    become a concession — "we''ll let you look, just don''t come in." The entire infrastructure
    of construction site safety is reinterpreted as a response to male compulsion.

    '
  pivot_locus: logical
  pivot_concept: construction_site_barriers
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_convention
  primary_template: reductio
  difficulties: 'Template choice between reductio and mundane_as_monumental was contested.
    The reframing of fences elevates a mundane observation to grand explanatory theory
    (mundane_as_monumental territory). But the rhetorical shape is more "accepted
    premise → absurd conclusion" (reductio): Jerry presents "men are drawn to work"
    as established fact and then draws an absurd causal inference. The "That''s why"
    connector is doing reductio work — it presents the conclusion as logically forced.
    Chose reductio as primary, with the understanding that mundane_as_monumental could
    be a secondary_template.

    '
