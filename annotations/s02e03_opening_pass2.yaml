      adversarial_review: incomplete
      voice_attribution: incomplete

    transcript_fragment: >
      I hate clothes, okay? I hate buying them. I hate picking them out
      of my closet. I can't stand every day trying to come up with little
      outfits for myself.

    joke:
      content:
        primary_domain: [domestic_life, fashion]
        concepts: [clothes_shopping]
        pivot_concept: clothes_shopping
        specificity:
          default_level: 2
          trajectory: null
        content_moves: []

      logic:
        setup_expectation: >
          The escalating "I hate" repetition builds toward what sounds like
          a genuine, adult complaint about the burden of clothing. The
          audience expects a grownup grievance about shopping, expense,
          or fashion pressure.
        punchline_violation: >
          "Little outfits for myself" reframes the adult clothing burden
          as something childish and diminutive. "Outfits" is a word
          associated with children's dress-up or doll clothes, and "for
          myself" adds a note of pathetic self-service. The adult act of
          getting dressed is reread as a childlike, slightly humiliating
          daily craft project.

        pivot_mechanism:
          operation: reinterpretation
          operation_alternative: null
          # TEST: Two readings of the same material.
          # Reading 1 (setup): getting dressed = adult responsibility,
          # a burden of modern life.
          # Reading 2 (punchline): getting dressed = assembling "little
          # outfits" like a child playing dress-up. Same activity, two
          # frames. The humor comes from the shift to the diminutive frame.
          reading_switch: none
          scale_shift: contraction
          # STRICT TEST: Could I swap to expansion? Yes — the same
          # reinterpretation (adult dressing as childlike) could be
          # expanded to a species-wide absurdity rather than contracted
          # to a personal diminutive. The contraction (from adult burden
          # to "little outfits") is a separable intensifier.
          wordplay: none

        setup_frame: establishes_behavior
        # "I hate buying them, picking them out" describes something
        # people DO. The audience recognizes this behavior without Jerry
        # needing to establish a premise.

        pivot_locus: logical
        resolution_requires: [shared_experience]

      structure:
        primary_template: mundane_as_monumental
        # The escalating "I hate" repetition treats the mundane act of
        # getting dressed with the rhetorical gravity of a profound
        # grievance. The frame of intensity is sustained against trivial
        # content.
        secondary_templates: [escalation]
        # The "I hate... I hate... I can't stand" builds across beats.
