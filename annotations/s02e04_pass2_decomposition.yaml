- joke_id: s02e04_b1_lp2
  text: 'Many times I will intentionally ruin my entire appetite. Just ruin it.

    '
  setup_expectation: 'The cookie bit has established adult freedom in trivial terms.
    The audience is inside the comic frame. "Intentionally ruin my entire appetite"
    imports the parental language of childhood scolding -- "you''ll ruin your appetite"
    -- as a frame the audience recognizes from being a child.

    '
  punchline_violation: 'Jerry treats the childhood warning as a goal rather than a
    threat. The parental prohibition ("don''t ruin your appetite") is reframed as
    an adult achievement to pursue deliberately. The word "intentionally" does the
    heaviest work: it flips the childhood frame from something that happens to you
    accidentally into something you do on purpose as a marker of freedom. "Just ruin
    it" doubles down with relish.

    '
  pivot_locus: logical
  pivot_concept: appetite_ruining
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'The evaluative reframe (bad-to-good) is not quite captured by reading_switch
    or scale_shift. reading_switch covers literal/figurative mode changes; scale_shift
    covers scope/gravity. An evaluative flip (transgression-to-achievement on the
    SAME act) fits neither modifier cleanly. This might be a vocabulary gap: the pivot-mechanisms
    system has no modifier for valence-flip on the act itself. I classified the core
    operation as reinterpretation because the test produces two clean readings of
    the same material. Negation was considered but rejected: nothing is negated --
    the act of ruining the appetite is affirmed, not contradicted. The frame around
    the act changes, not the truth value.

    '
  physical_performance: null
  act_out:
    present: false
    character_type: null
