- joke_id: s02e04_b1_lp3
  text: 'And then, I call my mother up right after to tell her that I did it. "Hello,
    Mom? yeah, I just ruined my entire appetite.. cookies."

    '
  setup_expectation: 'The bit has established deliberate appetite-ruining as an adult
    freedom. The audience expects the next beat to continue the theme of self-congratulatory
    autonomy -- perhaps more examples of trivial adult freedoms, or an escalation
    of the appetite destruction.

    '
  punchline_violation: 'Instead of moving on, Jerry calls his mother to REPORT the
    transgression. The adult who just declared his freedom immediately reverts to
    a child-parent dynamic by confessing. The performative adult autonomy is undercut:
    a truly autonomous adult wouldn''t need to tell Mom. The confession reimports
    the exact authority structure the cookies were supposed to transcend. "Cookies"
    as the final word -- a bare, monosyllabic confession -- lands as the bathetic
    specificity of this non-event.

    '
  pivot_locus: logical
  pivot_concept: adult_autonomy
  pivot_mechanism:
    operation: negation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'The hardest call here is between negation and extension. Extension
    would frame this as: accepted premise (adult freedom from parental food rules)
    followed to an absurd conclusion (calling Mom to report). But extension requires
    the punchline to ACCEPT the premise and follow its logic. The phone call doesn''t
    follow from the premise of adult freedom -- it contradicts it. An autonomous adult
    wouldn''t call Mom. The behavior negates the autonomy claim. Negation fits because
    the setup''s implicit claim (I''m free from parental authority over food) is rendered
    false by the compulsive confession. The phone call is the behavioral not-X.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: casual
    register_gap: treats_serious_as_mundane
    character_gloss: Jerry performing himself as a grown man calling his mother to
      confess eating cookies -- the adult autonomy champion reverting to a child's
      confessional register, casual and matter-of-fact about a non-event.
- joke_id: s02e04_b1_lp4
  text: 'See, because as an adult, we understand even if you ruin an appetite, there''s
    another appetite coming right behind it. There''s no danger in running out of
    appetites.

    '
  setup_expectation: 'The parental frame ("don''t ruin your appetite") carries an
    implicit premise: appetites are scarce, fragile, and once ruined, the consequence
    (not eating dinner, missing nutrition) is real. The audience holds this childhood
    logic as background.

    '
  punchline_violation: 'Jerry articulates the adult realization that appetites are
    renewable and abundant. "There''s another appetite coming right behind it" treats
    appetites as a commodity with infinite supply, like buses on a route. The childhood
    fear of "ruining" something precious is dissolved by the adult recognition that
    the resource was never scarce. "No danger in running out of appetites" makes explicit
    what every adult already implicitly knows but has never verbalized in these terms.

    '
  pivot_locus: logical
  pivot_concept: appetite_ruining
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: reductio
  difficulties: 'The tension between extension and articulation is the hardest call
    in this monologue. The articulation test: "If the audience KNEW what the punchline
    would say, would they still find it funny?" Partially yes -- the recognition that
    appetites come back is a shared truth. But the specific framing as a supply-chain
    commodity ("coming right behind it," "running out," "no danger") goes beyond mere
    verbalization of the shared truth into absurd-commodity territory. The audience
    knew appetites come back; they did NOT independently frame this as a supply-chain
    risk assessment. Extension captures the move past the shared truth into absurd
    logical territory. The template call between reductio and mundane_as_monumental
    is also debatable. I chose reductio because the "as an adult, we understand" signals
    a mock-logical argument structure, and the bit follows a premise to conclusion.
    But mundane_as_monumental is also present: the pedagogical gravity applied to
    appetite logistics is a frame/content mismatch.

    '
