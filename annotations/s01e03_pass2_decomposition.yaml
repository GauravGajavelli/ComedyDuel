jokes:
- joke_id: seinfeld_s01e03_opening_01
  transcript_excerpt: 'It seems like such an... arbitrary, ridiculous thing to just
    pick a finger and you show it to the person. It''s a finger, what does it mean?
    Someone shows me one of their fingers and I''m supposed to feel bad. Is that the
    way it''s supposed to work?

    '
  setup_expectation: 'The setup establishes the middle finger as a culturally loaded,
    emotionally charged gesture — a woman gives Jerry the finger in traffic and we
    understand this as a meaningful insult. The audience shares the cultural frame:
    "the finger" = aggression, hostility, a recognized affront.

    '
  punchline_violation: 'The punchline strips the gesture of its cultural meaning and
    re-presents it as what it literally is: a person selecting one of their digits
    and displaying it. Under this reading, "the finger" is absurd — why would seeing
    someone''s finger make you feel bad? The violation is the denaturalization of
    a gesture everyone takes for granted as meaningful.

    '
  pivot_locus: logical
  pivot_concept: the_middle_finger_gesture
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: figurative_to_literal
    scale_shift: contraction
  setup_frame: establishes_convention
  primary_template: reductio
  difficulties: '1. OPERATION AMBIGUITY (reinterpretation vs. articulation): The observation
    has an "isn''t that true" quality — the audience half-knows the gesture is arbitrary.
    But the specific reframe (stripping cultural meaning to see the bare digit) is
    not something the audience had already articulated. The surprise of the new frame
    is load-bearing, so reinterpretation wins. Confidence: medium-high.

    2. READING_SWITCH: figurative_to_literal is clean here — "the finger" as idiomatic
    expression is read literally as a physical digit. However, the gesture itself
    is not purely linguistic; it''s a physical cultural convention. The vocabulary''s
    reading_switch is defined for linguistic interpretation modes, and "the finger"
    straddles language and gesture. I applied figurative_to_literal because "gives
    me the finger" is an idiom and the punchline literalizes it, but a stricter reading
    of the vocabulary might say this is "conventional_to_literal" — a mode the vocabulary
    doesn''t have. Flagging for review.

    3. SCALE_SHIFT: contraction is defensible — the gesture drops from cultural weight
    to trivial anatomy — but it''s intertwined with the reinterpretation rather than
    being an independent move. The deflation is a consequence of the literalization,
    not a separate comic lever. Could argue "none" if scale_shift requires independence
    from the operation. I kept contraction because the vocabulary says "Is the deflation
    itself load-bearing for the humor?" and yes, the bathetic drop from "insult" to
    "digit" is where the laugh lives.

    4. TEMPLATE: reductio vs. mundane_as_monumental. The rhetorical shape is argumentative
    (chain of "what does it mean? / am I supposed to feel bad? / is that how it works?")
    which fits reductio. But the bit also has a mild mundane_as_monumental quality
    in reverse — treating something culturally monumental as mundane. The vocabulary
    doesn''t have a "monumental_as_mundane" template. Reductio captures the argumentative
    chain better than any alternative.

    '
  physical_performance: null
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: seinfeld_s01e03_opening_02
  transcript_excerpt: 'I mean, you could just give someone the toe, really, couldn''t
    you? I would feel worse if I got the toe, than if I got the finger. ''Cause it''s
    not easy to give someone the toe, you''ve gotta get the shoe off, the sock off
    and drive, get it up and uh [pretends to drive with one foot in the air] look
    at that toe, buddy. I mean, that''s really insulting to get the toe, isn''t it?

    '
  setup_expectation: 'Joke 1 established that "the finger" is an arbitrary body-part
    insult. The implicit premise now accepted: if insults work by displaying body
    parts, then ANY body part could serve the function, and the degree of insult should
    correlate with something (effort, commitment, difficulty).

    '
  punchline_violation: 'Jerry proposes the toe as a superior insult, then follows
    the logic with complete sincerity: the toe requires removing shoe and sock while
    driving, lifting the foot, and presenting it — all of which makes it a more committed
    and therefore more insulting gesture. The violation is not a frame switch but
    the earnest pursuit of absurd logistics that nobody asked for.

    '
  pivot_locus: logical
  pivot_concept: body_part_as_insult_gesture
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: reductio
  difficulties: '1. TEMPLATE CHOICE (reductio vs. escalation): The logistics sequence
    (shoe off, sock off, drive, get it up, present it) is an escalating list, and
    the act-out of driving with one foot up is the peak of escalation. But this escalation
    is IN SERVICE of a reductio argument ("the toe is more insulting because look
    how hard it is"). The primary shape is argumentative, so reductio wins as primary_template.
    Escalation is a strong secondary_template candidate.

    2. SETUP_FRAME: I chose establishes_category ("body parts as insult gestures")
    over establishes_norm because the setup doesn''t really establish a norm to be
    violated — it establishes a category to be explored. However, the category was
    created by Joke 1, and Joke 2 inherits it. The setup_frame vocabulary doesn''t
    have a value for "inherits frame from prior joke." This is a mild vocabulary gap
    — not significant enough to flag formally, but worth noting.

    3. RELATIONSHIP BETWEEN JOKES 1 AND 2: Joke 2 depends on Joke 1''s reinterpretation.
    The literalized "body part = insult" frame from Joke 1 becomes the accepted premise
    for Joke 2''s extension. This is a clean setup-tag/extension relationship: reinterpretation
    opens the space, extension explores it. The two jokes work as a bit with different
    operations (reinterpretation then extension), which matches the existing annotation
    in annotated_monologues.yaml.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: confident
    register_gap: treats_mundane_as_serious
    character_gloss: 'Jerry acts out a driver giving someone the toe — performing
      the physical logistics of removing a shoe and sock while driving, then hoisting
      the foot up with declarative bravado: "look at that toe, buddy." The character
      is an everyman (a regular driver in traffic) who speaks with confident assurance,
      treating the absurd act of presenting a toe as a genuine, committed insult.
      The register gap is treats_mundane_as_serious because the character applies
      real conviction and effort to what is a completely fabricated, nonsensical gesture.

      '
