# =============================================================================
# Pass 2 — Silent Decomposition
# Episode: S01E03 "The Robbery" — Opening Monologue
# =============================================================================

jokes:

  # ===========================================================================
  # JOKE 1: "Arbitrary, ridiculous thing to just pick a finger"
  # ===========================================================================
  - joke_id: seinfeld_s01e03_opening_01
    transcript_excerpt: >
      It seems like such an... arbitrary, ridiculous thing to just pick a
      finger and you show it to the person. It's a finger, what does it mean?
      Someone shows me one of their fingers and I'm supposed to feel bad.
      Is that the way it's supposed to work?

    # --- Step 1: GLOSS (reasoning trace) ---
    setup_expectation: >
      The setup establishes the middle finger as a culturally loaded, emotionally
      charged gesture — a woman gives Jerry the finger in traffic and we
      understand this as a meaningful insult. The audience shares the cultural
      frame: "the finger" = aggression, hostility, a recognized affront.
    punchline_violation: >
      The punchline strips the gesture of its cultural meaning and re-presents
      it as what it literally is: a person selecting one of their digits and
      displaying it. Under this reading, "the finger" is absurd — why would
      seeing someone's finger make you feel bad? The violation is the
      denaturalization of a gesture everyone takes for granted as meaningful.

    # --- Step 2: pivot_locus ---
    pivot_locus: logical
    # The humor is cognitive — seeing the gesture differently — not driven
    # by an emotional shift.

    # --- Step 3: pivot_concept ---
    pivot_concept: "the_middle_finger_gesture"
    # The concept doing the recontextualization work is the gesture itself,
    # toggling between "culturally loaded insult" and "arbitrary digit display."

    # --- Step 4: pivot_mechanism.operation ---
    # TEST for reinterpretation: Can I give two distinct readings of the
    # SAME material?
    #   Reading 1 (setup): The middle finger is a powerful, culturally
    #     encoded insult. Receiving it is an affront.
    #   Reading 2 (punchline): It's a person holding up one of ten digits.
    #     It is physically meaningless — just a finger.
    # YES — same gesture, two frames. Nothing is negated (the gesture still
    # happened), no second domain is introduced, no premise is followed to
    # absurd conclusion. The humor is in the frame shift itself.
    #
    # TEST for articulation: Would it still be funny if you knew the
    # punchline was coming? Partially — the observation has a "yes, I never
    # thought of it that way" quality — but the surprise of the reframe IS
    # load-bearing. The audience didn't already think of the finger as
    # arbitrary; Jerry makes them see it that way. This tips it toward
    # reinterpretation over articulation.
    pivot_mechanism:
      operation: reinterpretation
      reading_switch: figurative_to_literal
      # "The finger" / "gives me the finger" is a figurative/idiomatic
      # expression. The punchline treats it literally: it's a finger, a
      # physical digit. The figurative cultural meaning is discarded in
      # favor of the literal anatomical reading.
      scale_shift: contraction
      # The gesture is contracted from "serious social affront" to "trivial
      # physical object." The deflation from culturally weighty to
      # anatomically mundane is load-bearing for the humor.

    # --- Step 5-6: reading_switch and scale_shift captured above ---

    # --- Step 7: setup_frame ---
    setup_frame: establishes_norm
    # The setup establishes the cultural norm: receiving the finger is a
    # meaningful insult. The punchline then denaturalizes that norm.

    # --- Step 8: primary_template ---
    primary_template: reductio
    # Jerry takes the premise "this gesture is meaningful" and argues
    # against it by reducing it to its literal components: it's just a
    # finger, just a digit, why should I feel bad? The rhetorical shape
    # is argumentative — a chain of rhetorical questions that reduce the
    # gesture to absurdity.
    # Considered: mundane_as_monumental — but this goes in the opposite
    # direction (monumental reduced to mundane, not mundane elevated).

    # --- Step 9: Difficulties ---
    difficulties: >
      1. OPERATION AMBIGUITY (reinterpretation vs. articulation): The
      observation has an "isn't that true" quality — the audience half-knows
      the gesture is arbitrary. But the specific reframe (stripping cultural
      meaning to see the bare digit) is not something the audience had already
      articulated. The surprise of the new frame is load-bearing, so
      reinterpretation wins. Confidence: medium-high.

      2. READING_SWITCH: figurative_to_literal is clean here — "the finger"
      as idiomatic expression is read literally as a physical digit. However,
      the gesture itself is not purely linguistic; it's a physical cultural
      convention. The vocabulary's reading_switch is defined for linguistic
      interpretation modes, and "the finger" straddles language and gesture.
      I applied figurative_to_literal because "gives me the finger" is an
      idiom and the punchline literalizes it, but a stricter reading of the
      vocabulary might say this is "conventional_to_literal" — a mode the
      vocabulary doesn't have. Flagging for review.

      3. SCALE_SHIFT: contraction is defensible — the gesture drops from
      cultural weight to trivial anatomy — but it's intertwined with the
      reinterpretation rather than being an independent move. The deflation
      is a consequence of the literalization, not a separate comic lever.
      Could argue "none" if scale_shift requires independence from the
      operation. I kept contraction because the vocabulary says "Is the
      deflation itself load-bearing for the humor?" and yes, the bathetic
      drop from "insult" to "digit" is where the laugh lives.

      4. TEMPLATE: reductio vs. mundane_as_monumental. The rhetorical
      shape is argumentative (chain of "what does it mean? / am I supposed
      to feel bad? / is that how it works?") which fits reductio. But
      the bit also has a mild mundane_as_monumental quality in reverse —
      treating something culturally monumental as mundane. The vocabulary
      doesn't have a "monumental_as_mundane" template. Reductio captures
      the argumentative chain better than any alternative.


  # ===========================================================================
  # JOKE 2: "You could just give someone the toe"
  # ===========================================================================
  - joke_id: seinfeld_s01e03_opening_02
    transcript_excerpt: >
      I mean, you could just give someone the toe, really, couldn't you? I
      would feel worse if I got the toe, than if I got the finger. 'Cause
      it's not easy to give someone the toe, you've gotta get the shoe off,
      the sock off and drive, get it up and uh [pretends to drive with one
      foot in the air] look at that toe, buddy. I mean, that's really
      insulting to get the toe, isn't it?

    # --- Step 1: GLOSS (reasoning trace) ---
    setup_expectation: >
      Joke 1 established that "the finger" is an arbitrary body-part insult.
      The implicit premise now accepted: if insults work by displaying body
      parts, then ANY body part could serve the function, and the degree of
      insult should correlate with something (effort, commitment, difficulty).
    punchline_violation: >
      Jerry proposes the toe as a superior insult, then follows the logic
      with complete sincerity: the toe requires removing shoe and sock while
      driving, lifting the foot, and presenting it — all of which makes it
      a more committed and therefore more insulting gesture. The violation
      is not a frame switch but the earnest pursuit of absurd logistics
      that nobody asked for.

    # --- Step 2: pivot_locus ---
    pivot_locus: logical
    # The humor is in the logical chain, not an emotional shift.

    # --- Step 3: pivot_concept ---
    pivot_concept: "body_part_as_insult_gesture"
    # The concept doing the work is the idea that body-part display =
    # insult, and that the system has a logic that can be optimized.

    # --- Step 4: pivot_mechanism.operation ---
    # TEST for extension: Can I state (1) the accepted premise and (2) the
    # absurd-but-logically-valid conclusion?
    #   Accepted premise: Body parts can be used as insults; the degree of
    #     insult correlates with the effort/commitment required to display
    #     the body part.
    #   Absurd conclusion: The toe is more insulting than the finger because
    #     you have to remove your shoe and sock and lift your foot while
    #     driving — the logistics prove superior commitment.
    # YES — the premise is never challenged. Jerry treats it as axiomatic
    # and follows its logic to an absurd but internally consistent endpoint.
    # The humor is in the destination, not in contradicting or reframing
    # the starting point.
    #
    # This is the vocabulary's own positive example for extension. Clean fit.
    pivot_mechanism:
      operation: extension
      reading_switch: none
      # No figurative/literal switch. "The toe" is not an idiom being
      # literalized — it's a novel proposal within the already-literalized
      # frame from Joke 1.
      scale_shift: none
      # No shift in scope or gravity. The joke stays at the same register
      # of absurd-practical throughout. It doesn't elevate to universal
      # principle or deflate to bathos.

    # --- Step 7: setup_frame ---
    setup_frame: establishes_category
    # The setup establishes a category: "body parts that can serve as
    # insult gestures." The punchline proposes a new (absurd) member of
    # that category and evaluates it by the category's internal logic.

    # --- Step 8: primary_template ---
    primary_template: reductio
    # Jerry accepts the premise and argues it with mock-logical rigor to
    # an absurd conclusion. The rhetorical shape is an argument: premise
    # ("any body part could be an insult") -> evidence ("the toe requires
    # more effort") -> conclusion ("the toe is more insulting"). The
    # escalating specificity of the logistics (shoe off, sock off, drive,
    # lift foot) gives it the chain structure of reductio.
    #
    # Considered: escalation — the logistics DO build (shoe -> sock ->
    # drive -> lift -> present). But the escalation serves the reductio
    # chain; it's not the primary template. The joke's shape is
    # "argument to absurd conclusion," not "list of incrementing items."
    # Escalation could be a secondary_template.

    # --- Step 9: Difficulties ---
    difficulties: >
      1. TEMPLATE CHOICE (reductio vs. escalation): The logistics sequence
      (shoe off, sock off, drive, get it up, present it) is an escalating
      list, and the act-out of driving with one foot up is the peak of
      escalation. But this escalation is IN SERVICE of a reductio argument
      ("the toe is more insulting because look how hard it is"). The
      primary shape is argumentative, so reductio wins as primary_template.
      Escalation is a strong secondary_template candidate.

      2. SETUP_FRAME: I chose establishes_category ("body parts as insult
      gestures") over establishes_norm because the setup doesn't really
      establish a norm to be violated — it establishes a category to be
      explored. However, the category was created by Joke 1, and Joke 2
      inherits it. The setup_frame vocabulary doesn't have a value for
      "inherits frame from prior joke." This is a mild vocabulary gap —
      not significant enough to flag formally, but worth noting.

      3. RELATIONSHIP BETWEEN JOKES 1 AND 2: Joke 2 depends on Joke 1's
      reinterpretation. The literalized "body part = insult" frame from
      Joke 1 becomes the accepted premise for Joke 2's extension. This is
      a clean setup-tag/extension relationship: reinterpretation opens the
      space, extension explores it. The two jokes work as a bit with
      different operations (reinterpretation then extension), which matches
      the existing annotation in annotated_monologues.yaml.
