- joke_id: s02e05_opening_lp6
  text: 'And what if I''m walking? Move the shoes, move the shoes, move the shoes,
    move the shoes.

    '
  setup_expectation: 'The shoes-at-the-bottom tag has already escalated the absurdity.
    The audience expects either a conclusion or one more small escalation within the
    same frame.

    '
  punchline_violation: 'The man — head still in the suit on the rack — now wants to
    simulate WALKING by having someone move the shoes back and forth. The static preview
    has become a dynamic simulation. The repetition of "move the shoes" four times
    performs the walking rhythm itself, the verbal cadence mimicking footsteps. The
    absurd commitment has gone from "preview" to "full-body motion capture on a department
    store rack."

    '
  pivot_locus: logical
