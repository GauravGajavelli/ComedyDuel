- joke_id: s02e05_opening_lp1
  text: 'Women don''t try on the clothes, they get behind the clothes, you see? They
    take a dress off the rack, and they hold it up against themself.

    '
  setup_expectation: '"I''ve been watching women in the department stores" sets up
    a gendered-observation frame. "They do it differently from men" promises a comparative
    insight. The audience expects a behavior difference that reveals something about
    women''s psychology or vanity — the standard observational-comedy contract.

    '
  punchline_violation: 'The difference is reframed as purely spatial: women don''t
    try on clothes, they "get behind" them. The psychology is stripped away; what
    remains is a geometric description of a body positioned behind fabric. The audience
    recognizes the exact behavior instantly but has never heard it described this
    way — as hiding behind the garment rather than evaluating it.

    '
  pivot_locus: logical
  pivot_concept: clothes_shopping
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_behavior
  primary_template: mundane_as_monumental
  difficulties: 'The main tension is between reinterpretation and articulation. Articulation
    test: if the audience KNEW what was coming, would it still be funny? Partially
    — the recognition of "getting behind the clothes" is strong. But the humor requires
    seeing the familiar behavior through a new geometric lens. The audience has never
    thought of holding up a dress as "getting behind" it. That frame shift is load-bearing,
    which pushes this to reinterpretation over articulation. Close call.

    '
  physical_performance: null
- joke_id: s02e05_opening_lp2
  text: 'They can tell something from this.

    '
  setup_expectation: 'Having described the behavior of holding a dress up, the audience
    expects Jerry to explain what information women extract from it — the payoff of
    the observation. The implied frame is that this behavior is rational and yields
    useful data about fit, style, or appearance.

    '
  punchline_violation: 'Jerry declines to specify WHAT they can tell — just that they
    "can tell something." The vagueness is the joke: the behavior is treated as yielding
    information, but the information is unidentifiable. This undermines the rationality
    of the act without directly attacking it — the women believe they''re learning
    something, Jerry can''t figure out what.

    '
  pivot_locus: logical
  pivot_concept: clothes_shopping
  pivot_mechanism:
    operation: articulation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_expectation
  primary_template: mundane_as_monumental
  difficulties: 'Could be classified as reinterpretation (reframing the rational act
    as irrational) but no new frame is imposed — Jerry stays within the same frame
    and just notes the opacity. The humor is recognition, not reframe. Articulation
    fits cleanly.

    '
  physical_performance: null
- joke_id: s02e05_opening_lp3
  text: 'They stick one leg way out ''cause they need to know, if some day I''m one-legged,
    and at a forty-five degree angle, what am I gonna wear?

    '
  setup_expectation: 'The leg-out pose is a real, recognizable thing women do when
    holding up a dress. The implicit assumption is that the pose serves some evaluative
    purpose — mimicking how the dress will look when worn, checking length, approximating
    fit.

    '
  punchline_violation: 'Jerry follows the literal geometry of the pose to its logical
    conclusion: the only scenario where the pose would yield accurate data is one
    where the woman is one-legged and tilted at forty-five degrees. The pose''s evaluative
    purpose is replaced by an absurd hypothetical that the pose would actually prepare
    for.

    '
  pivot_locus: logical
  pivot_concept: clothes_shopping
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_behavior
  primary_template: reductio
  difficulties: 'Extension vs. reinterpretation is the key call. Reinterpretation
    would require two readings of the same material; here there is only one reading
    (the pose as preview) followed forward into absurdity. Extension fits cleanly.
    The reductio template and extension operation co-occur as expected per the vocabulary
    guidance.

    '
  physical_performance: null
- joke_id: s02e05_opening_lp4
  text: 'You never see a guy take a suit off the rack, put his head in the neck, and
    go, "What do you think about this suit? I think I''ll get it. Yeah, it looks fine."

    '
  setup_expectation: '"You never see a man do that" sets up a gender contrast. The
    audience expects a description of how men shop differently — perhaps more decisively,
    less carefully, or with less ritual.

    '
  punchline_violation: 'Instead of describing actual male behavior, Jerry transplants
    the women''s hold-it-up method onto a man with a suit — and the image is immediately
    absurd. A man jamming his head into the neck hole of a suit on the rack and declaring
    "I''ll get it" makes the women''s method look equally absurd by reflection. The
    humor is in the grotesque visual of the male version AND in the retroactive absurdification
    of the female version.

    '
  pivot_locus: logical
  pivot_concept: clothes_shopping
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: false_equivalence
  difficulties: 'Operation choice between extension and mapping is the hardest call
    here. Mapping would require the humor to come from an APT parallel between two
    domains; here the humor comes from the MISMATCH when you extend the technique
    to men''s clothing — the technique breaks down, which is the joke. Extension fits
    better: accepted premise (hold-up method works), followed to absurd destination
    (man with head in suit neck). Template choice between false_equivalence and reductio:
    the joke equates two situations (women holding dress vs. man putting head in suit)
    more than it builds an argumentative chain, so false_equivalence is the dominant
    shape.

    '
  physical_performance: null
- joke_id: s02e05_opening_lp5
  text: 'Put some shoes by the bottom of the pants, I wanna make sure. Yeah, perfect.

    '
  setup_expectation: 'The man-with-head-in-suit image has landed. The audience expects
    the bit to conclude or move on. If it continues, the expectation is that the hypothetical
    stays at the same level of absurdity.

    '
  punchline_violation: 'The hypothetical escalates: not only has the man jammed his
    head into the suit, he now wants shoes placed at the bottom of the pants to complete
    the ensemble evaluation. The commitment to the absurd method deepens — the man
    is assembling a full outfit preview while his head is stuck in a suit on the rack.
    Each additional detail makes the image more ridiculous.

    '
  pivot_locus: logical
  pivot_concept: clothes_shopping
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
