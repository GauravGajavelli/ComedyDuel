- joke_id: s01e10_opening_lp4
  text: 'Kinda looks like a pig is trying to push his way through from the other side.
    That''s where I plug in.

    '
  setup_expectation: 'The "lump with two slots" image has just landed. The audience
    has a visual of a paint-entombed outlet. They expect either another escalation
    of the paint premise or a transition to the next topic.

    '
  punchline_violation: 'Jerry reinterprets the visual he just created. The two slots
    and the lump are re-seen as a pig''s snout pressing through the wall from the
    other side. The same physical description ("lump with two slots") now supports
    two readings: an electrical outlet under paint, and an animal''s face pushing
    through a surface. The absurd image of a pig emerging from the wall is then immediately
    domesticated with "that''s where I plug in" -- grounding the surreal image back
    to mundane function.

    '
  pivot_locus: both
  pivot_concept: apartment_shrinkage
  pivot_mechanism:
    operation: mapping
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_anomaly
  primary_template: anthropomorphization
  difficulties: 'Mapping vs. reinterpretation is the hardest call here. I chose mapping
    because the joke introduces a second domain (animal imagery) and the humor is
    in the aptness of the visual parallel between pig snout and outlet. Reinterpretation
    would require two readings of the SAME material; here there are two distinct things
    (outlet and pig) being connected via shared visual structure. The template choice
    between anthropomorphization and escalation is also close. I chose anthropomorphization
    because the pig image is the joke''s dominant move -- giving animal agency to
    an inanimate object. The escalation of the routine continues, but this beat''s
    own template is the anthropomorphic image.

    '
