- joke_id: s01e10_opening_lp1
  text: 'I''ve been living in this apartment for years and years, and every time I
    paint it, it kinda gets me down. I look around, and I think, well, it''s a little
    bit smaller now.

    '
  setup_expectation: '"Every time I paint it, it kinda gets me down" establishes that
    repainting is a source of dissatisfaction. The audience expects the reason to
    be about effort, mess, color choice, or the futility of home maintenance -- normal
    complaints about painting.

    '
  punchline_violation: 'The reason for the dissatisfaction is that the apartment is
    physically smaller due to the accumulated thickness of paint layers. This is a
    technically true but absurdly negligible observation treated as a real source
    of distress. The premise is accepted (paint has thickness) and followed to an
    absurd conclusion (the apartment is measurably shrinking).

    '
  pivot_locus: logical
  pivot_concept: apartment_shrinkage
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'Extension vs. articulation is the main tension. This is not articulation
    because no one implicitly knows or has felt that their apartment shrinks from
    repainting -- the observation is novel, not a verbalization of shared experience.
    It is extension: the premise (paint has thickness) is real and accepted, and the
    conclusion (the apartment is shrinking) is logically valid but absurd. The template
    choice between mundane_as_monumental and reductio is close. I chose mundane_as_monumental
    because the joke does not build an argumentative chain -- it makes a single leap
    from accepted fact to disproportionate emotional response. Reductio would require
    more logical steps.

    '
  physical_performance: null
- joke_id: s01e10_opening_lp2
  text: 'You know, I realize it''s just the thickness of the paint, but I''m aware
    of it. It keeps coming in and coming in. Every time I paint it, it''s closer and
    closer.

    '
  setup_expectation: 'The acknowledgment "I realize it''s just the thickness of the
    paint" signals rational self-awareness. The audience expects the bit to deflate
    -- Jerry recognizes the absurdity of his own complaint, so surely the joke is
    over.

    '
  punchline_violation: 'Instead of deflating, Jerry doubles down. The rational acknowledgment
    is immediately overridden by escalating anxiety: "it keeps coming in and coming
    in," "closer and closer." The self-awareness changes nothing. The walls continue
    their advance despite his knowing it''s irrational.

    '
  pivot_locus: logical
  pivot_concept: apartment_shrinkage
  pivot_mechanism:
    operation: negation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_expectation
  primary_template: escalation
  difficulties: 'Whether this is a separate laugh-point or a continuation of LP1 is
    debatable. I separated it because the concession-then-doubling-down is a distinct
    comedic move from the initial observation. The operation choice between negation
    and extension is the key call. I chose negation because the joke''s pivot is specifically
    the failure of self-awareness to resolve the concern -- the implicit promise of
    "I know it''s just paint" is negated by the continued anxiety. Extension would
    require the premise to be followed further; here the premise is the same but the
    expectation of rational resolution is what gets contradicted.

    '
  physical_performance: null
- joke_id: s01e10_opening_lp3
  text: 'I don''t even know where the wall outlets are anymore. I just look for like
    a lump with two slots in it.

    '
  setup_expectation: 'The shrinking-apartment premise has been established. "I don''t
    even know where the wall outlets are" extends the conceit further -- the paint
    accumulation now has a practical consequence. The audience expects continued hyperbole
    about the apartment''s deterioration.

    '
  punchline_violation: 'Instead of further hyperbole, Jerry provides a precise, concrete
    visual: "a lump with two slots in it." The outlets haven''t disappeared; they''ve
    been entombed in paint to the point where their physical form is only discernible
    as a topographic feature. The specificity of the image -- searching by touch for
    a bump in the wall surface -- commits fully to the absurd premise with observational
    precision.

    '
  pivot_locus: logical
  pivot_concept: apartment_shrinkage
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_anomaly
  primary_template: escalation
  difficulties: 'The operation choice between extension and articulation is straightforward
    here -- this is clearly extension, as no one has the shared experience of outlets
    buried under paint. The template choice is between escalation (this is a further
    beat in a building sequence) and mundane_as_monumental (a wall outlet described
    with archaeological precision). I chose escalation because the joke''s structural
    role within the routine -- incrementing the absurdity -- is its dominant shape.
    The specificity serves the escalation.

    '
