- joke_id: s01e10_opening_lp5
  text: 'My idea of the perfect living room would be the bridge on the Starship Enterprise.
    You know what I mean? Big chair, nice screen, remote control.

    '
  setup_expectation: '"My idea of the perfect living room would be the bridge on the
    Starship Enterprise" sets up a sci-fi fantasy. The audience expects Jerry to elaborate
    on the futuristic, technologically impressive features of the Enterprise bridge
    -- warp drive, viewscreen showing alien worlds, commanding a starship.

    '
  punchline_violation: 'The features Jerry identifies are: big chair, nice screen,
    remote control. These are the features of a suburban living room, not a starship
    command center. The Enterprise bridge is reframed as appealing not for its sci-fi
    grandeur but for its domestic comforts. The same set of physical objects supports
    two readings: futuristic command station and lazy man''s couch setup.

    '
  pivot_locus: logical
  pivot_concept: enterprise_as_living_room
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_expectation
  primary_template: monumental_as_mundane
  difficulties: 'The scale_shift direction is the main question. The joke starts with
    the monumental (Enterprise) and deflates it to the mundane (living room), which
    is contraction. But one could argue the joke elevates a living room to Enterprise-level
    status (expansion). I chose contraction because the punchline''s direction is
    downward: the bridge''s features are reduced to chair/screen/remote. The audience''s
    trajectory is from "wow, the Enterprise" to "oh, it''s just a living room." The
    template could also be false_equivalence (equating bridge and living room), but
    mundane_as_monumental better captures the joke''s shape -- the monumental frame
    is applied to reveal the mundane content underneath.

    '
  physical_performance: null
- joke_id: s01e10_opening_lp6
  text: 'That''s why Star Trek really was the ultimate male fantasy. Just hurling
    through space in your living room, watching TV.

    '
  setup_expectation: '"The ultimate male fantasy" invokes the register of power fantasies,
    sexual conquest, or adventure. Applied to Star Trek, the audience expects the
    fantasy to be about commanding a starship, exploring the galaxy, or being Captain
    Kirk.

    '
  punchline_violation: 'The male fantasy is: watching TV in your living room. The
    entire apparatus of Star Trek -- warp drive, alien encounters, galactic exploration
    -- is reduced to the experience of sitting and watching a screen. "Hurling through
    space" is grammatically parallel to "in your living room, watching TV," collapsing
    the cosmic into the domestic within a single sentence.

    '
  pivot_locus: logical
  pivot_concept: enterprise_as_living_room
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_behavior
  primary_template: monumental_as_mundane
  difficulties: 'This laugh-point is closely connected to LP5 and could be treated
    as a tag rather than a separate joke. I separated it because it introduces a new
    framing concept ("ultimate male fantasy") that goes beyond the bridge-as-living-room
    observation. The operation is clearly reinterpretation: Star Trek is reread from
    sci-fi epic to domestic comfort. The template choice is clean -- mundane_as_ monumental,
    with the "ultimate male fantasy" language doing the elevated framing work.

    '
