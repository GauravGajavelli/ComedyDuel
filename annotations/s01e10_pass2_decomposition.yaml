- joke_id: s01e10_opening_lp7
  text: 'That''s why all the aliens were always dropping in, because Kirk was the
    only one that had a big screen.

    '
  setup_expectation: 'Within the Star Trek universe, alien encounters are understood
    as diplomatic incidents, hostile incursions, or first-contact events -- high-stakes
    narrative events driven by interstellar politics or exploration.

    '
  punchline_violation: 'The aliens weren''t invading or making contact; they were
    coming over to watch Kirk''s TV. "Dropping in" reframes alien encounters as social
    visits from neighbors. The Enterprise''s viewscreen -- a strategic military asset
    -- is reread as the neighborhood''s only big-screen TV, and alien visitations
    become the sci-fi equivalent of "can we come over and watch the game?"

    '
  pivot_locus: logical
  pivot_concept: enterprise_as_living_room
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_behavior
  primary_template: monumental_as_mundane
  difficulties: 'This is the most structurally clean laugh-point in the bit. Reinterpretation
    is unambiguous: the same Star Trek events are reread under the domestic frame.
    The only question is whether this is extension rather than reinterpretation --
    does it follow the living-room premise to a further conclusion? I chose reinterpretation
    because the humor is in the FRAME SHIFT applied to a new element (alien encounters),
    not in following the same premise further. Each element of Star Trek is being
    independently reframed, not derived from a single chain of logic.

    '
