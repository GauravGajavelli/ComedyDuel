- joke_id: s01e08_open_lp2
  text: '''Cause anytime I see a movie or a TV show where there''s people from the
    future of another planet, they''re all wearing the same thing. Somehow they decided
    "This is going to be our outfit. One-piece silver jumpsuit, V-stripe, and boots.
    That''s it."

    '
  setup_expectation: 'The observation that sci-fi civilizations all wear uniforms
    is presented as evidence for the prediction that fashion will eventually disappear.
    The audience is tracking a speculative argument about the future of clothing.
    The implied frame is futurism or social commentary.

    '
  punchline_violation: 'Jerry voices the alien civilization''s fashion committee as
    if it were a mundane, boardroom-style decision: "This is going to be our outfit."
    The hyper-specific inventory (one-piece, silver, V-stripe, boots) and the finality
    of "That''s it" treat a civilization-wide aesthetic choice with the casualness
    of someone settling on a work uniform. The humor is in the transplant of bureaucratic
    decision-making onto an interplanetary civilization.

    '
  pivot_locus: logical
  pivot_concept: fashion_uniformity
  pivot_mechanism:
    operation: transplant
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_premise
  primary_template: monumental_as_mundane
  difficulties: 'The operation choice between transplant and articulation is the hardest
    call. Articulation would say: the audience already implicitly knows sci-fi uniforms
    look like committee decisions, and Jerry is just voicing it. I chose transplant
    because the humor requires the MISMATCH between the bureaucratic framework and
    the civilizational context -- it is not a pre-known truth being verbalized but
    a framework being imported. The test: if the bureaucratic framework genuinely
    fit (i.e., alien civilizations really did hold casual committee meetings about
    clothes), the joke would lose force. The joke depends on the framework NOT fitting,
    which points to transplant over mapping. Scale_shift: contraction is debatable
    -- one could argue the contraction IS the transplant and needn''t be separately
    marked. I kept it because removing the scale mismatch (making the committee proportional
    to the decision) would significantly weaken the humor.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: authority
    character_register: confident
    register_gap: treats_mundane_as_serious
    character_gloss: An alien civilization's fashion committee member declaring the
      species-wide outfit choice with boardroom finality — 'This is going to be our
      outfit. That's it.'
- joke_id: s01e08_open_lp3
  text: 'We should come up for an outfit for earth. An earth outfit. We should vote
    on it.

    '
  setup_expectation: 'The sci-fi observation has been established. "An earth outfit"
    extends the premise by applying it to humanity. The audience expects the speculative
    argument to continue at the same register -- observational social commentary about
    fashion convergence.

    '
  punchline_violation: '"We should vote on it" treats the absurd proposal (a single
    outfit for all of Earth) as a solvable civic problem. The democratic process --
    voting -- is applied to a question that is clearly beyond its jurisdiction. The
    humor is in the extension of the accepted premise (one outfit per civilization)
    to its logical civic implementation for Earth.

    '
  pivot_locus: logical
  pivot_concept: fashion_uniformity
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: reductio
  difficulties: 'Extension vs. transplant is the tension. "Voting" imports the democratic
    framework onto fashion, which could be transplant. But the humor is less about
    the mismatch of democracy-applied-to- fashion and more about following the premise
    (one outfit per civilization) to its logical next step (how would we actually
    do it?). The premise is accepted and pushed forward, not reframed by an imported
    framework. Extension fits more cleanly because the test produces a cleaner artifact:
    premise (civilizations converge) -> conclusion (we should vote). Template: reductio
    over escalation, because there is an argumentative chain driving toward an absurd
    conclusion, not merely an incrementing feature.

    '
