    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s01e08_open_lp4
  text: 'Candidates propose different outfits, no speeches. They walk out, twirl,
    walk off. We just sit in the audience and go, "That was nice. I could wear that."

    '
  setup_expectation: '"Candidates propose different outfits" continues the civic-process
    extension. The audience is tracking a political-election metaphor applied to clothing.
    The expected register is still speculative social commentary, possibly with escalating
    absurdity.

    '
  punchline_violation: 'The political process is stripped to a fashion show: no speeches,
    just a twirl. The audience''s role collapses from engaged democratic participants
    to passive fashion-show spectators offering tepid approval ("That was nice. I
    could wear that"). The deflation from democratic deliberation to fashion-show
    passivity, and the bathetically mild endorsement, are the laugh. The specificity
    of "twirl" and the banality of "I could wear that" commit fully to the deflated
    register.

    '
  pivot_locus: logical
  pivot_concept: fashion_uniformity
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_sequence
  primary_template: reductio
  difficulties: 'This is the hardest call in the routine. The operation could be transplant
    (fashion-show framework applied to democratic process), but I chose extension
    because the fashion-show procedural detail follows logically FROM the premise
    that clothing is what''s being voted on. If you''re voting on outfits, of course
    the "debate" is a runway walk. The framework isn''t imported from a foreign domain;
    it emerges naturally from the premise being followed. The transplant test asks:
    does the humor come from mismatch? Partially -- but more from the logical inevitability
    that voting on clothes WOULD look like this. That points to extension. Scale_shift:
    contraction is debatable. The "That was nice. I could wear that" line does its
    own work by deflating democratic engagement to passive consumer approval, and
    this contraction is arguably separable from the extension operation. I marked
    it because removing the bathos (replacing "I could wear that" with something proportionate
    to a civilizational vote) would lose humor.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: casual
    register_gap: treats_serious_as_mundane
    character_gloss: A voter-spectator offering tepid, passive approval of a civilizational
      outfit choice as if browsing a department store — 'That was nice. I could wear
      that.'
