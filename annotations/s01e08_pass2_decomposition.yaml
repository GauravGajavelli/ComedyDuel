- joke_id: s01e08_open_lp1
  text: 'I hate clothes, okay? I hate buying them. I hate picking them out of my closet.
    I can''t stand every day trying to come up with little outfits for myself.

    '
  setup_expectation: '"I hate clothes" establishes a complaint register. The escalating
    list (buying, picking, can''t stand) builds toward a grievance about the burden
    of fashion. The audience expects the complaint to land on something proportional
    -- cost, social pressure, wasted time.

    '
  punchline_violation: '"Little outfits for myself" reframes the daily act of getting
    dressed as something childlike and precious -- as if Jerry is a parent dressing
    a toddler, except the toddler is himself. The diminutive "little" and the self-directed
    "for myself" shrink the adult task to something absurdly dainty. The complaint
    is real, but the description makes the complainer ridiculous.

    '
  pivot_locus: logical
  pivot_concept: clothing_selection
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_expectation
  primary_template: mundane_as_monumental
  difficulties: 'The contraction and the mundane_as_monumental template pull in seemingly
    opposite directions -- one shrinks, the other elevates. They coexist because the
    COMPLAINT is monumental while the OBJECT ("little outfits") is contracted. The
    reinterpretation vs. articulation call is the main tension. I chose reinterpretation
    because "little outfits for myself" forces a specific reframe (the childlike/dainty
    reading) that the setup''s complaint register did not invite. Articulation would
    require the audience to already implicitly think of getting dressed as assembling
    "little outfits"; the humor depends on that reframe being new, not pre-known.

    '
