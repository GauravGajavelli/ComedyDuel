        primary_domain: [social_ritual]
        concepts: [going_out]
        pivot_concept: going_out
        specificity:
          default_level: 2
          trajectory: null
        content_moves: []

      logic:
        setup_expectation: >
          "Why we're here" invokes a philosophical/existential register.
          The audience expects an answer about purpose, meaning, or at
          least an observational thesis about comedy clubs. The question
          carries the weight of a big opening gambit.
        punchline_violation: >
          The answer is tautological and deflating: we're here "to be out."
          The grand question is answered with a spatial/social truism. Then
          the mundane state of "being out" is immediately elevated to "one
          of the single most enjoyable experiences of life," applying
          monumental language to a trivial concept. The joke operates in
          two beats: first a contraction (existential to spatial), then an
          elevation (spatial to monumental).

        pivot_mechanism:
          operation: reinterpretation
          operation_alternative: null
          # TEST: Two readings of the same material.
          # Reading 1 (setup): "Why we're here" = existential/philosophical question.
          # Reading 2 (punchline): "Why we're here" = literal spatial state (being out of the house).
          # The humor comes from the shift between registers. Nothing is negated;
          # the question is answered, just in a radically different frame.
          reading_switch: none
          scale_shift: none
          # STRICT TEST: The contraction from existential to spatial IS the
          # reinterpretation. Could I swap to expansion while keeping the same
          # operation? No — a reinterpretation that reframes grand-as-trivial
          # CANNOT work as grand-to-grander. The scale change is fused with
          # the operation. Set to none.
          wordplay: none

        setup_frame: establishes_convention
        # "Why are we here?" is a question the audience already recognizes as
        # a standard philosophical/rhetorical opener. They hold this belief
        # without Jerry stating it. Convention, not premise.

        pivot_locus: logical
        resolution_requires: [shared_experience]

      structure:
        primary_template: mundane_as_monumental
        # The rhetorical shape: "being out" is treated with the gravity of a
        # life philosophy ("one of the single most enjoyable experiences of life").
        # The frame of importance is sustained; the content is trivial.
        secondary_templates: []
        subversions_applied: []
        has_tag: false
        tag_operation: null
        tag_has_own_pivot: null
        act_out:
          present: false
          character_type: null
          register_gap: null
          character_gloss: ""

      relational:
        positioning:
          default: lateral_observer
          trajectory: null
        audience_implication: co_observer
        # The audience is literally "out" with Jerry. They're co-observers
        # of the shared condition he's naming.
        shared_experience:
          required: true
          universality: universal
          comprehensibility_without_experience: 4
        performed_relatability:
          present: true
          # "You know, why we're here?" — direct address presuming shared frame.

