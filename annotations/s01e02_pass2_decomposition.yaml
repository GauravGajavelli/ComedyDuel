  primary_template: false_equivalence
  difficulties: 'The vocabulary file itself uses this line as a canonical mapping
    example and a negative example for both transplant and articulation, so classification
    is high-confidence. Template choice is less clean: false_equivalence pairs two
    unequal things, but the humor here is in the aptness (mapping), not the mismatch
