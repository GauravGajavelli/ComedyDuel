- joke_id: s01e02_joke1
  text_span: 'Two women in front of me. One of them, her total was eight dollars,
    the other three dollars. They both of course choose to pay by the use of the [pause
    and gesture to audience for response] Cheque.

    '
  setup_expectation: 'The setup establishes a mundane supermarket scenario. The phrase
    "of course" and the theatrical pause imply an absurdly predictable behavior —
    paying by cheque for trivially small amounts. The audience is invited to name
    the punchword themselves.

    '
  punchline_violation: 'There is no traditional violation here. The humor is in the
    audience collectively confirming the shared observation — they all KNOW it''s
    a cheque. The "of course" does the comedic work by framing an ordinary payment
    method as a predictable inevitability worthy of exasperation.

    '
  pivot_locus: affective
  pivot_concept: null
  pivot_mechanism:
    operation: articulation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_convention
  primary_template: mundane_as_monumental
  difficulties: 'This is borderline between a joke and a premise-establishment beat.
    The laugh (if any) comes from the call-and-response ritual, not from a pivot.
    Classifying the operation as "articulation" is correct by the test, but it feels
    like stretching the vocabulary to cover what is essentially audience-participation
    setup comedy. The vocabulary doesn''t have a clean fit for "performed inevitability."

    '
