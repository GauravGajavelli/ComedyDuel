- joke_id: s01e02_joke4
  text_span: 'I think to a man, a cheque is like a note from your mother that says
    "I don''t have any money, but if you''ll contact these people, I''m sure they''ll
    stick up for me..."

    '
  setup_expectation: '"There''s something about a cheque that is not masculine" sets
    up the audience to expect an explanation of why cheques feel emasculating. The
    audience expects a reason rooted in masculine psychology or social norms.

    '
  punchline_violation: 'Instead of psychological analysis, Jerry maps the cheque onto
    a child''s note from their mother to the teacher — a plea for trust backed by
    the authority of absent adults. The cheque is revealed to have the same structure:
    "I don''t have the money myself, but these people (the bank) will vouch for me."
    The humor is in the aptness of the parallel AND in the contraction — a legitimate
    financial instrument reduced to a child''s excuse note.

    '
