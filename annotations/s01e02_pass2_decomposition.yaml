# =============================================================================
# Pass 2 — Silent Decomposition
# Episode 2: "The Stakeout" Opening Monologue
# =============================================================================

monologue_id: s01e02_opening
episode: "The Stakeout"

jokes:

  # ===========================================================================
  # JOKE 1: Audience call-and-response — "the cheque"
  # ===========================================================================
  - joke_id: s01e02_joke1
    text_span: >
      Two women in front of me. One of them, her total was eight dollars,
      the other three dollars. They both of course choose to pay by the
      use of the [pause and gesture to audience for response] Cheque.

    setup_expectation: >
      The setup establishes a mundane supermarket scenario. The phrase
      "of course" and the theatrical pause imply an absurdly predictable
      behavior — paying by cheque for trivially small amounts. The audience
      is invited to name the punchword themselves.

    punchline_violation: >
      There is no traditional violation here. The humor is in the audience
      collectively confirming the shared observation — they all KNOW it's
      a cheque. The "of course" does the comedic work by framing an ordinary
      payment method as a predictable inevitability worthy of exasperation.

    pivot_locus: affective
    pivot_concept: null

    pivot_mechanism:
      operation: articulation
      # TEST: If the audience KNEW what was coming, would it still be funny?
      # Yes — the entire bit is structured so the audience says "cheque"
      # themselves. The humor is in the communal recognition, not in surprise.
      reading_switch: none
      scale_shift: none

    setup_frame: establishes_norm
    # The setup establishes "women + small amounts + supermarket" as a
    # recognizable norm that points to a known behavior.

    primary_template: mundane_as_monumental
    # The theatrical pause and "by the use of the..." elevates a trivial
    # payment choice into a dramatic reveal.

    difficulties: >
      This is borderline between a joke and a premise-establishment beat.
      The laugh (if any) comes from the call-and-response ritual, not from
      a pivot. Classifying the operation as "articulation" is correct by the
      test, but it feels like stretching the vocabulary to cover what is
      essentially audience-participation setup comedy. The vocabulary doesn't
      have a clean fit for "performed inevitability."

  # ===========================================================================
  # JOKE 2: Women are fast with cheques / can't find keys
  # ===========================================================================
  - joke_id: s01e02_joke2
    text_span: >
      Now, the fact is, if it's a woman in front of you that's writing the
      cheque, you will not be waiting long. I have noticed that women are
      very fast with cheques, y'know, 'cuz they write out so many cheques.
      The keys, they can never find in their purse, they don't know where
      that is, but the cheque book they got that.

    setup_expectation: >
      The setup invokes the stereotype that women are disorganized with
      personal items (rummaging in purses). The "women are fast with
      cheques" claim sets up an expectation that Jerry will explain WHY
      they're fast — perhaps some complimentary or neutral reason. The
      underlying audience assumption is the "women fumbling in purse"
      stereotype.

    punchline_violation: >
      The punchline deploys the fumbling-in-purse stereotype (keys) only
      to CONTRAST it with cheque-writing speed. The expected disorganization
      is confirmed for keys but negated for cheques — creating a selective
      competence that is funny because it implies cheques are written so
      frequently they've become a practiced skill, while everything else
      remains chaotic.

    pivot_locus: logical
    pivot_concept: selective_competence
    # The concept doing the load-bearing work is the idea that competence
    # is domain-specific in a revealing way.

    pivot_mechanism:
      operation: negation
      # TEST: Setup implies X (women fumble for things in their purse).
      # Punchline asserts not-X (for cheque books specifically, they don't
      # fumble at all). The humor comes from the contradiction being
      # selective — negation applies to one item but not others.
      reading_switch: none
      scale_shift: none

    setup_frame: establishes_norm
    # Establishes the norm of "women fumbling in purses" so the cheque-book
    # exception can violate it.

    primary_template: false_equivalence
    # Pairs keys and cheque books as if they should behave the same way
    # (both things in a purse), then reveals they don't — the humor is in
    # the false assumption of equivalence being broken.

    difficulties: >
      Close call between negation and reinterpretation. The stereotype isn't
      truly "reinterpreted" — it's selectively negated. The humor is in the
      contradiction (they CAN'T find keys, they CAN find the cheque book),
      not in seeing the same thing differently. Negation wins by the test.
      Template was harder: this could be mundane_as_monumental (treating
      cheque-writing skill as a notable achievement) but the structural
      shape is more about the false pairing of keys vs. cheque book.

  # ===========================================================================
  # JOKE 3: Cheque book comes out of a holster
  # ===========================================================================
  - joke_id: s01e02_joke3
    text_span: >
      They never fumble for the cheque book — the cheque book comes out
      of a holster: "Who do I make it out to?... There's my ID..."

    setup_expectation: >
      The prior material established that women are fast with cheque books.
      The audience expects further observational detail about the speed.

    punchline_violation: >
      Instead of more description, Jerry maps the cheque-book retrieval
      onto a gunslinger's quick-draw. The holster image reveals a structural
      parallel: both involve practiced speed, a single fluid motion, and
      confident deployment of the instrument. The act-out ("Who do I make
      it out to?") sustains the gunslinger's cool-under-fire attitude.

    pivot_locus: logical
    pivot_concept: quick_draw_retrieval
    # The concept is the practiced-speed-of-retrieval that links checkout
    # and quick-draw.

    pivot_mechanism:
      operation: mapping
      # TEST: Source domain: Western gunslinger quick-draw. Target domain:
      # woman retrieving cheque book at supermarket. Shared structure:
      # practiced, single-motion, rapid deployment of a specialized tool
      # from a dedicated holder, performed with total confidence. The humor
      # is in the APTNESS of the parallel — women really do produce cheque
      # books with that speed and confidence.
      #
      # The vocabulary's own negative example for transplant uses this exact
      # line: "the joke isn't about MISAPPLICATION — the humor is in the
      # SIMILARITY." Confirmed mapping.
      reading_switch: none
      scale_shift: none

    setup_frame: establishes_norm
    # The norm of "women are fast with cheques" is established; the mapping
    # gives it an image.

    primary_template: false_equivalence
    # Pairs a supermarket checkout with a frontier gunfight. But the pairing
    # reveals genuine structural similarity rather than pure mismatch.

    difficulties: >
      The vocabulary file itself uses this line as a canonical mapping
      example and a negative example for both transplant and articulation,
      so classification is high-confidence. Template choice is less clean:
      false_equivalence pairs two unequal things, but the humor here is in
      the aptness (mapping), not the mismatch (false_equivalence). This
      might be better as mundane_as_monumental — treating cheque retrieval
      with gunslinger gravity. I went with false_equivalence because the
      structural shape is explicitly "A is like B" (two things equated),
      but I flag this as a close call.

  # ===========================================================================
  # JOKE 4: A cheque is like a note from your mother
  # ===========================================================================
  - joke_id: s01e02_joke4
    text_span: >
      I think to a man, a cheque is like a note from your mother that says
      "I don't have any money, but if you'll contact these people, I'm sure
      they'll stick up for me..."

    setup_expectation: >
      "There's something about a cheque that is not masculine" sets up
      the audience to expect an explanation of why cheques feel emasculating.
      The audience expects a reason rooted in masculine psychology or social
      norms.

    punchline_violation: >
      Instead of psychological analysis, Jerry maps the cheque onto a
      child's note from their mother to the teacher — a plea for trust
      backed by the authority of absent adults. The cheque is revealed to
      have the same structure: "I don't have the money myself, but these
      people (the bank) will vouch for me." The humor is in the aptness
      of the parallel AND in the contraction — a legitimate financial
      instrument reduced to a child's excuse note.

    pivot_locus: logical
    pivot_concept: delegated_authority
    # The concept doing the work: the cheque delegates financial authority
    # to a third party, just as a child's note delegates credibility to
    # a parent.

    pivot_mechanism:
      operation: mapping
      # TEST: Source domain: childhood — a child presenting a note from
      # their mother to establish credibility they don't have themselves.
      # Target domain: commerce — a man presenting a cheque at a store.
      # Shared structure: the person at the counter lacks the direct
      # resource (money/authority), so they present a written document
      # that asks the recipient to contact a more credible third party
      # (bank/mother) who will "stick up for" them. The parallel is apt
      # and the humor comes from recognizing the structural identity.
      reading_switch: none
      scale_shift: contraction
      # A financial instrument (socially legitimate, institutionally backed)
      # is contracted to a child's excuse note (pathetic, authority-less).
      # The contraction from "legitimate payment method" to "begging note
      # from a kid" is load-bearing for the humor.

    setup_frame: establishes_anomaly
    # "There's something about a cheque that is not masculine" frames
    # the observation as an anomaly requiring explanation.

    primary_template: false_equivalence
    # Explicitly equates cheque = note from your mother. Two unequal things
    # treated as equivalent.

    difficulties: >
      Clean classification. The vocabulary's own combined-classification
      examples list "I wrote on these; is this of any value at all?" as
      mapping + contraction, which is the same joke cluster. The only
      question is whether this joke and joke 5 (the escalation of the
      mother's note) should be treated as one joke or two. I'm treating
      the initial mapping ("cheque is like a note from your mother") as
      the primary joke and the escalation within the act-out as a
      separate laugh-point because it has its own pivot (extension).

  # ===========================================================================
  # JOKE 5: "I wrote on these; is this of any value at all?"
  # ===========================================================================
  - joke_id: s01e02_joke5
    text_span: >
      If you just trust me this one time I don't have any money but I
      have these... I wrote on these; is this of any value at all?

    setup_expectation: >
      The prior joke established the cheque-as-mother's-note mapping.
      Within that frame, the character voice is already pleading. The
      audience expects continued pleading within the established analogy.

    punchline_violation: >
      The punchline pushes the mapping's logic to its terminal point:
      if a cheque really IS just a note, then strip away even the note's
      institutional backing and you're left with a person holding a piece
      of paper they scribbled on, asking if the scribble itself has value.
      The cheque has been fully reduced from financial instrument to
      worthless scrap with writing on it.

    pivot_locus: logical
    pivot_concept: delegated_authority
    # Same concept as joke 4, but now pushed to collapse.

    pivot_mechanism:
      operation: extension
      # TEST: Accepted premise: a cheque is essentially a note asking
      # someone to trust you because a third party will vouch for you.
      # Absurd-but-logical conclusion: if the third-party backing is
      # removed, you're just a person holding paper with writing on it,
      # asking "is this of any value at all?" The premise is accepted
      # and followed to its logical terminus.
      reading_switch: none
      scale_shift: contraction
      # Final step of the contraction arc: financial instrument →
      # mother's note → scribble on paper → "is this of any value?"
      # Each step contracts the cheque's authority further.

    setup_frame: establishes_norm
    # The "mother's note" frame is now the established norm; the
    # extension pushes from within it.

    primary_template: reductio
    # The joke accepts the premise (cheque = begging note) and follows
    # its internal logic to an absurd conclusion (cheque = worthless
    # scribble). This is the argumentative-chain shape of reductio.

    difficulties: >
      The boundary between this and joke 4 is a judgment call. They
      share the same mapping, but this laugh-point has its own distinct
      operation (extension rather than mapping) and its own template
      (reductio rather than false_equivalence). The extension test is
      clean: accepted premise (cheque = note) → absurd conclusion
      (cheque = meaningless scribble). Reductio is the right template
      because the joke builds through logical steps, each stripping
      more authority from the cheque.
