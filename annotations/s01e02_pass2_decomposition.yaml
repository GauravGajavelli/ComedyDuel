- joke_id: s01e02_joke5
  text_span: 'If you just trust me this one time I don''t have any money but I have
    these... I wrote on these; is this of any value at all?

    '
  setup_expectation: 'The prior joke established the cheque-as-mother''s-note mapping.
    Within that frame, the character voice is already pleading. The audience expects
    continued pleading within the established analogy.

    '
  punchline_violation: 'The punchline pushes the mapping''s logic to its terminal
    point: if a cheque really IS just a note, then strip away even the note''s institutional
    backing and you''re left with a person holding a piece of paper they scribbled
    on, asking if the scribble itself has value. The cheque has been fully reduced
    from financial instrument to worthless scrap with writing on it.

    '
