- joke_id: s01e02_joke3
  text_span: 'They never fumble for the cheque book — the cheque book comes out of
    a holster: "Who do I make it out to?... There''s my ID..."

    '
  setup_expectation: 'The prior material established that women are fast with cheque
    books. The audience expects further observational detail about the speed.

    '
  punchline_violation: 'Instead of more description, Jerry maps the cheque-book retrieval
    onto a gunslinger''s quick-draw. The holster image reveals a structural parallel:
    both involve practiced speed, a single fluid motion, and confident deployment
    of the instrument. The act-out ("Who do I make it out to?") sustains the gunslinger''s
    cool-under-fire attitude.

    '
  pivot_locus: logical
  pivot_concept: quick_draw_retrieval
  pivot_mechanism:
    operation: mapping
    reading_switch: none
