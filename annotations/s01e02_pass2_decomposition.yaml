- joke_id: s01e02_joke2
  text_span: 'Now, the fact is, if it''s a woman in front of you that''s writing the
    cheque, you will not be waiting long. I have noticed that women are very fast
    with cheques, y''know, ''cuz they write out so many cheques. The keys, they can
    never find in their purse, they don''t know where that is, but the cheque book
    they got that.

    '
  setup_expectation: 'The setup invokes the stereotype that women are disorganized
    with personal items (rummaging in purses). The "women are fast with cheques" claim
    sets up an expectation that Jerry will explain WHY they''re fast — perhaps some
    complimentary or neutral reason. The underlying audience assumption is the "women
    fumbling in purse" stereotype.

    '
  punchline_violation: 'The punchline deploys the fumbling-in-purse stereotype (keys)
    only to CONTRAST it with cheque-writing speed. The expected disorganization is
    confirmed for keys but negated for cheques — creating a selective competence that
    is funny because it implies cheques are written so frequently they''ve become
    a practiced skill, while everything else remains chaotic.

    '
  pivot_locus: logical
  pivot_concept: selective_competence
  pivot_mechanism:
    operation: negation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_convention
  primary_template: false_equivalence
  difficulties: 'Close call between negation and reinterpretation. The stereotype
    isn''t truly "reinterpreted" — it''s selectively negated. The humor is in the
    contradiction (they CAN''T find keys, they CAN find the cheque book), not in seeing
    the same thing differently. Negation wins by the test. Template was harder: this
    could be mundane_as_monumental (treating cheque-writing skill as a notable achievement)
    but the structural shape is more about the false pairing of keys vs. cheque book.

    '
