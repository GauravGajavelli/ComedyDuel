- joke_id: s01e01_b1_beat1_punchline
  text: 'You know, why we''re here? To be out, this is out...and out is one of the
    single most enjoyable experiences of life.

    '
  setup_expectation: '"Why we''re here" invokes the register of existential or philosophical
    inquiry. The audience expects an answer that matches that gravity -- something
    about comedy, entertainment, community, or meaning.

    '
  punchline_violation: 'The answer is a bathetic tautology: "to be out." The existential
    question is deflated to a trivially literal, self-evident spatial state. The comedy
    club is not a venue for entertainment or meaning; it is simply "out" as opposed
    to "home."

    '
  pivot_locus: logical
  pivot_concept: going_out
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_convention
  physical_performance: null
  primary_template: mundane_as_monumental
  difficulties: 'The contraction vs. reinterpretation distinction is tight here. The
    pivot-mechanisms.yaml negative example under negation explicitly identifies this
    joke as reinterpretation, and the combined classification examples list it as
    reinterpretation + none + contraction. That aligns with my independent analysis.
    The question is whether reading_switch should be "none" or "figurative_to_literal."
    I chose none because "why we''re here" is not a figurative expression being literalized
    -- it is a genuine question whose scope is being contracted. The reframe is conceptual,
    not linguistic.

    '
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s01e01_b1_beat1_tag
  text: 'People...did you ever hear people talking about "We should go out"? This
    is what they''re talking about...this whole thing, we''re all out now, no one
    is home. Not one person here is home, we''re all out!

    '
  setup_expectation: '"Going out" is understood as an idiom meaning to socialize,
    attend events, enjoy nightlife -- a qualitative experience, not a spatial state.

    '
  punchline_violation: 'Jerry treats "going out" as a purely literal spatial descriptor.
    "We''re all out now" means we are physically not-home, full stop. The idiom''s
    connotations of fun, socializing, and experience are stripped away; what remains
    is the bare locative fact.

    '
  pivot_locus: logical
  pivot_concept: going_out
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: figurative_to_literal
    scale_shift: contraction
  setup_frame: establishes_convention
  physical_performance: null
  primary_template: mundane_as_monumental
  difficulties: 'This is the clearest figurative_to_literal case in the monologue.
    The annotated_monologues.yaml labels the mechanism as "literalization," which
    maps directly to reinterpretation + figurative_to_literal under the new system.
    No ambiguity here.

    '
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s01e01_b1_beat2_punchline
  text: 'There are people tryin'' to find us, they don''t know where we are. "Did
    you ring?, I can''t find him." "Where did he go?" "He didn''t tell me where he
    was going". He must have gone out.

    '
  setup_expectation: 'The setup ("people are trying to find us") creates a mildly
    conspiratorial frame -- the audience and Jerry are complicit in being unreachable.
    The expected payoff is some elaboration on the mystery or the fun of being away.

    '
  punchline_violation: 'Instead of elaborating, Jerry voices the people at home performing
    a banal, universally recognizable phone-call routine. The humor is in the audience
    recognizing this exact conversational script from their own lives. There is no
    frame switch -- the humor is in the articulation of a shared experience everyone
    has had but never verbalized as comedy.

    '
  pivot_locus: logical
  pivot_concept: going_out
  pivot_mechanism:
    operation: articulation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_behavior
  physical_performance: null
  primary_template: shared_recognition
  difficulties: 'The choice between articulation and reinterpretation is the main
    tension. I chose articulation because there is no frame switch -- the punchline
    doesn''t make you see the phone call differently; it just voices what everyone
    already knows happens. The humor is in the verbalization, not in a reframe. However,
    a case could be made for reinterpretation: the setup frames the audience as excitingly
    unreachable, and the punchline reframes this as mundane domestic confusion. I
    find articulation cleaner because the test ("would it still be funny if you knew
    what was coming?") clearly passes -- the audience laughs at recognition, not surprise.
    The primary template choice of mundane_as_monumental is also debatable; this could
    be a straight articulation with no template mismatch. I chose mundane_as_monumental
    because Jerry does perform the phone call with conspiratorial gravity ("people
    are tryin'' to FIND us") that exceeds the triviality of the scenario.

    '
  act_out:
    present: true
    character_type: everyman
    character_register: bewildered
    register_gap: none
    character_gloss: 'Jerry voices the people left at home trying to locate someone
      who has gone out. The character performs a banal phone-call script — "Did you
      ring? I can''t find him." / "Where did he go?" / "He didn''t tell me where he
      was going" — a chain of confused, mildly exasperated everypeople performing
      the universal routine of trying to reach someone who is unreachable. The register
      is bewildered (confused, questioning), and it matches the situation (they genuinely
      don''t know where the person is), so the register gap is none.

      '
- joke_id: s01e01_b1_beat3_punchline
  text: 'You wanna go out: you get ready, you pick out the clothes, right? You take
    the shower, you get all ready, get the cash, get your friends, the car, the spot,
    the reservation...There you''re staring around, whatta you do? You go: "We gotta
    be getting back".

    '
  setup_expectation: 'The escalating list of preparation steps (clothes, shower, cash,
    friends, car, spot, reservation) builds investment in the "going out" project.
    Each item adds commitment. The audience expects the payoff to be proportional
    to the buildup -- a great night, an amazing experience, something worth all that
    preparation.

    '
  punchline_violation: 'The immediate desire upon arriving is to leave. The entire
    investment is negated: you wanted to go out, you went out, and now you want to
    go back. The desire the setup built is contradicted the moment it is fulfilled.

    '
  pivot_locus: logical
  pivot_concept: going_out
  pivot_mechanism:
    operation: negation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_sequence
  physical_performance: null
  primary_template: escalation
  difficulties: 'The pivot-mechanisms.yaml explicitly lists "Once you''re out, you
    wanna get back" under extension''s negative_example, noting it is NEGATION. This
    confirms my classification. The template choice between escalation and mundane_as_monumental
    is the only real tension. I chose escalation as primary because the list structure
    is load-bearing -- removing the escalating list and just saying "you want to go
    out, then you want to come back" would significantly weaken the joke. The escalation
    does the structural work; the negation does the logical work.

    '
  act_out:
    present: true
    character_type: everyman
    character_register: casual
    register_gap: treats_mundane_as_serious
    character_gloss: 'Jerry voices the generic person who, after an entire escalating
      ritual of preparation (clothes, shower, cash, friends, car, reservation), arrives
      at the destination and immediately says "We gotta be getting back." The character
      speaks with casual resignation, but the register gap is treats_mundane_as_serious
      because the elaborate buildup frames the act of going out as a monumental undertaking,
      making the casual desire to return home land as an absurd anticlimax. The character
      treats the trivial urge to go home as though it overrides the entire preparation
      project.

      '
- joke_id: s01e01_b1_beat3_tag
  text: 'Once you''re out, you wanna get back! You wanna go to sleep, you wanna get
    up, you wanna go out again tomorrow, right?

    '
  setup_expectation: 'The reversal has just landed (you go out, then want to come
    back). The audience expects this to be the joke''s conclusion -- a single ironic
    observation about human dissatisfaction.

    '
  punchline_violation: 'Jerry extends the reversal into an infinite loop: out -> back
    -> sleep -> up -> out again. The single contradiction becomes a recursive cycle
    with no exit. The human condition is not just ironic in one direction; it is perpetually
    oscillating.

    '
  pivot_locus: logical
  pivot_concept: going_out
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_premise
  physical_performance: null
  primary_template: escalation
  difficulties: 'The operation choice between extension and negation is the key question.
    This is clearly extension: the preceding joke''s negation (you want to go back)
    is ACCEPTED as a premise, and the tag follows it forward into the infinite loop.
    The tag does not contradict anything; it says "yes, and here''s where that leads."
    The scale_shift: expansion is load-bearing because the jump from "one night''s
    irony" to "perpetual human cycle" is part of the humor. Template choice: escalation
    over reductio. The loop builds through accumulation of beats (sleep, up, out,
    back) rather than through a logical argument chain. It is additive, not argumentative.

    '
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s01e01_b1_beat3_topper
  text: 'Where ever you are in life, it''s my feeling, you''ve gotta go.

    '
  setup_expectation: 'The bit has been about going out vs. staying home -- a specific
    social behavior. "Wherever you are in life" sounds like it is about to deliver
    a life-philosophy platitude or a sincere concluding observation about the human
    condition.

    '
  punchline_violation: '"You''ve gotta go" collapses the entire bit''s specific social
    observation into a pseudo-philosophical universal principle. But "go" carries
    a double meaning: the existential-sounding "you must move on / you cannot stay"
    AND the trivially literal "you have to leave wherever you are." The bit about
    going out is now reframed as a cosmic law of restlessness.

    '
  pivot_locus: logical
  pivot_concept: going_out
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_sequence
  physical_performance: null
  primary_template: mundane_as_monumental
  difficulties: 'This is the most ambiguous laugh-point in the monologue. The pivot-mechanisms.yaml
    combined classification examples list this as reinterpretation + none + expansion,
    which matches my analysis. The main tension is whether reading_switch should be
    none or literal_to_figurative. "You''ve gotta go" could be read as literal (you
    must physically leave) being elevated to figurative (existential imperative).
    I chose none because both readings are simultaneously available -- it is not a
    clean switch from one mode to the other but rather an ambiguity that the joke
    exploits. The template choice between mundane_as_monumental and escalation is
    also debatable: the topper is the culmination of an escalating bit. But the topper
    itself is not escalation (it does not add another beat in a series); it is a register
    shift that reframes the mundane as the monumental. So mundane_as_monumental is
    the topper''s own template, even though the broader bit uses escalation.

    '
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
