- joke_id: s02e06_b1_beat7_closer
  text: '"No, go ahead, what are you talking about?.. I don''t want to hear that.
    No, the all of you, get out of here. I''m going to bed."

    '
  setup_expectation: 'The escalating dismissal sequence has established a rhythm of
    cycling through story-tellers. The audience expects either more of the same pattern
    or a final particularly absurd dismissal.

    '
  punchline_violation: 'Instead of continuing the cycle, the king dismisses ALL the
    story-tellers at once and announces he''s going to bed -- the exact behavior of
    a frustrated channel-surfer who gives up and turns off the TV. The humor is in
    the completeness of the parallel: the ancient king even replicates the final move
    of the modern ritual (abandoning the search entirely). "I''m going to bed" is
    the ancient equivalent of turning off the television.

    '
  pivot_locus: logical
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_sequence
  primary_template: escalation
  difficulties: 'The template choice between escalation and mundane_as_monumental
    is close. The final beat has a mundane_as_monumental quality (dismissing thirty
    human beings is monumental; the motivation is the mundane frustration of not finding
    anything to watch). But the dominant shape is the CULMINATION of the escalating
