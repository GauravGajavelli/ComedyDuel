- joke_id: s02e06_b1_beat5_punchline
  text: 'I always wonder, in that era, if they would get, like, thirty story-tellers
    together so they could still flip around.

    '
  setup_expectation: 'The historical premise (ancient rulers had story-tellers) has
    been established. The audience expects either a comparison between ancient and
    modern entertainment, or an observation about how story-tellers were better/worse
    than TV.

    '
  punchline_violation: 'Instead of comparing the two eras, Jerry transplants the specific
    modern compulsion (channel-surfing) into the ancient context, imagining that rulers
    would have assembled thirty story-tellers to replicate the experience of flipping
    channels. The humor is in the absurd specificity of "thirty" and the image of
    the modern behavior reconstructed with ancient technology.

    '
  pivot_locus: logical
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: transplant
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'The operation could be mapping (the parallel between channel- surfing
    and cycling through story-tellers is structurally apt). However, the humor depends
    on the anachronistic mismatch -- the image is funny BECAUSE it doesn''t fit, not
    because it reveals a hidden parallel. If a king genuinely did cycle through story-
    tellers, the observation would be interesting but not funny. The mismatch is load-bearing,
    confirming transplant.

    '
