- joke_id: s02e06_b1_beat1_punchline
  text: 'Men get that remote control in their hands, they don''t even know what the
    hell they''re watching. You know, we just keep going, "Rerun, don''t wanna watch
    it.." "What are you watching?" "I don''t care, I gotta keep going."

    '
  setup_expectation: '"Men flip around the television more than women" establishes
    a familiar gendered-habit observation. The audience expects an explanation or
    a comparative illustration -- why men do it, or a specific funny scenario showing
    the difference.

    '
  punchline_violation: 'Instead of explaining the behavior, Jerry voices the interior
    monologue of a man channel-surfing and reveals it is entirely contentless -- the
    man has no criteria, no goal, no awareness of what he''s seeing. The humor is
    in the articulation of a behavior the audience recognizes but hasn''t heard voiced:
    channel-surfing as a compulsion disconnected from any desire to actually watch
    something.

    '
  pivot_locus: logical
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: articulation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_behavior
  primary_template: mundane_as_monumental
  difficulties: 'The main tension is between articulation and extension. The voiced
    monologue pushes slightly past pure recognition into comic exaggeration ("I don''t
    care, I gotta keep going" is heightened). However, the humor does not depend on
    following a premise to an absurd conclusion -- it depends on the audience recognizing
    the behavior. Removing the surprise and telling the audience what''s coming would
    not kill the laugh; therefore articulation.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: bewildered
    register_gap: unaware_of_absurdity
    character_gloss: A generic male channel-surfer voiced in fragmented interior monologue
      -- dismissing shows instantly, unable to articulate what he wants, compulsively
      continuing without awareness that the behavior is purposeless.
- joke_id: s02e06_b1_beat2_pivot
  text: 'Women don''t do this. See now, women will stop and go, "Well, let me see
    what the show is before I change the channel." You see? Men just fly.

    '
  setup_expectation: 'Having established men''s compulsive flipping, the audience
    expects the female counterpart to provide a contrast -- perhaps women are more
    selective, more patient, more rational about TV.

    '
  punchline_violation: 'The contrast is delivered as maximally reasonable behavior
    -- "let me see what the show is before I change the channel" -- which is so obviously
    sensible that it highlights the absurdity of the male behavior by comparison.
    The humor is in framing basic rationality as a gendered trait. The line "men just
    fly" caps it with a note of admiring bafflement.

    '
  pivot_locus: logical
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: articulation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_behavior
  primary_template: false_equivalence
  difficulties: 'This is a transitional beat and a lighter laugh. The template call
    is the hardest decision -- it could be mundane_as_monumental (the rational behavior
    is presented as a remarkable gender difference) or false_equivalence (rationality
    is equated with femininity). I chose false_equivalence because the rhetorical
    shape is the pairing of two unequal things (gender and common sense), and the
    mismatch of that pairing is what makes the observation funny rather than merely
    informative.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: earnest
    register_gap: treats_mundane_as_serious
    character_gloss: A generic woman voiced as the rational counterpart to the male
      channel-surfer -- earnestly proposing the obviously sensible idea of watching
      a show before changing the channel, as if this is a distinctive approach rather
      than basic common sense.
- joke_id: s02e06_b1_beat3_pivot
  text: 'Because women, you see, women nest and men hunt. That''s why we watch TV
    differently.

    '
  setup_expectation: '"Because" signals an explanation is coming. The audience expects
    either a genuine observational insight or a comic pseudo- explanation for the
    gendered TV behavior.

    '
  punchline_violation: 'Jerry invokes evolutionary psychology ("women nest and men
    hunt") as the explanation for channel-surfing habits. The humor is in the grandiosity
    of the framework -- reaching back to primal biology to explain a behavior that
    involves a couch and a remote control. The evolutionary framework is imported
    into the trivial domain of television habits, and the mismatch is the joke.

    '
  pivot_locus: logical
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: transplant
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_behavior
  primary_template: mundane_as_monumental
  difficulties: 'The operation choice between transplant and mapping is the key tension.
    There is a loose structural parallel (men scanning channels = men scanning the
    horizon for prey; women settling on a show = women maintaining a home base), which
    suggests mapping. But the humor depends on the framework being WRONG for the context
    -- evolutionary psychology is absurdly oversized for TV habits. If the parallel
    genuinely fit, the line would be a TED talk, not a joke. The mismatch is load-bearing,
    so transplant.

    '
  physical_performance: null
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s02e06_b1_beat4_setup
  text: 'Before there was flipping around, before there was television, kings and
    emperors and pharaohs and such had story-tellers that would tell them stories
    ''cause that was their entertainment.

    '
  setup_expectation: 'This is a transitional setup that establishes the historical
    premise. The audience registers the shift to ancient history and expects a callback
    to the channel-surfing behavior. The mild humor is in the phrasing "and such"
    applied to pharaohs -- the casual register against the historical grandeur.

    '
  punchline_violation: 'No distinct punchline -- this is primarily setup. The minor
    laugh comes from the register mismatch of "and such" applied to kings, emperors,
    and pharaohs, treating world-historical figures with Seinfeldian casualness.

    '
  pivot_locus: logical
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'This is borderline as a laugh-point -- it functions primarily as
    setup for the extended bit that follows. I included it because "and such" applied
    to pharaohs draws a recognition laugh from the audience. The reinterpretation
    classification is debatable; this could be articulation (Jerry is just being casually
    dismissive, and the audience recognizes the Seinfeldian voice). I chose reinterpretation
    because the humor requires the frame shift between the grand catalogue and the
    dismissive "and such" -- without that tonal shift, there is no laugh.

    '
