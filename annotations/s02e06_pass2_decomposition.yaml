- joke_id: s02e06_b1_beat6_extension
  text: 'Just go, "Alright start telling me a story, what''s happening? I don''t want
    to hear anymore. Shut up. Go to the next guy. What are you talking about? Is there
    a girl in that story? ..No? Shut up. Go to the next guy. What do you got? I don''t
    want to hear that either. Shut up."

    '
  setup_expectation: 'The thirty-story-tellers premise has been established. The audience
    expects Jerry to illustrate the scenario, probably with one or two examples of
    the king dismissing a story-teller.

    '
  punchline_violation: 'Jerry commits fully to the bit, performing the king''s voice
    as he cycles through story-tellers with escalating impatience. Each dismissal
    is faster and more contemptuous than the last. The humor compounds through repetition
    and escalation -- "Shut up. Go to the next guy" becomes a refrain. The specific
    detail "Is there a girl in that story?" imports the modern channel-surfer''s criteria
    (looking for attractive content) into the ancient context, adding another layer
    of anachronistic transplant.

    '
  pivot_locus: both
  pivot_concept: channel_surfing
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_sequence
  primary_template: escalation
  difficulties: 'The operation choice between extension and transplant is the hardest
    call. The transplant (modern behavior into ancient context) was established in
    beat 5; this beat EXTENDS the transplanted premise rather than performing a new
    transplant. The cognitive mechanism here is following the accepted premise (king-as-channel-surfer)
    to its absurd-but-logical destination (performing the full rapid-fire dismissal
    sequence). I chose extension because the humor is in the COMMITMENT to the scenario,
    not in the initial domain violation (which was the prior beat''s joke). The "is
    there a girl in that story?" detail could be a separate laugh-point but is better
    understood as an escalation beat within the sequence.

    '
