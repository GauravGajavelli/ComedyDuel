    not from a standalone frame mismatch. The operation could also be mapping (the
    parallel between turning off the TV and dismissing story-tellers is structurally
    apt), but the humor is in following the premise to completion rather than in revealing
    a hidden parallel. The aptness of the parallel is a bonus, not the mechanism.

    '
