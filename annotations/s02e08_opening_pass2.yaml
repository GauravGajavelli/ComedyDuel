          why_rejected: "The childhood phrase 'ruin your appetite' uses 'ruin' with figurative gravity (as if appetite were something precious and destructible). The punchline treats 'ruin' literally — you temporarily suppress hunger, and it comes back. This is a clear figurative-to-literal switch: the figurative expression 'ruin your appetite' is reread as literally describing a temporary, reversible state. The reading_switch is independently specifiable — the reinterpretation could work without literalizing 'ruin' (e.g., reframing it as a positive act rather than a literal one)."
        - alternative: "scale_shift could be none — is the expansion fused?"
          why_rejected: "The reinterpretation (appetite as renewable) could work at a contracted scale — e.g., 'appetite comes back in an hour, big deal.' The expansion to 'millions of them' and 'no danger of running out' elevates the observation to the register of a resource-management treatise. The expansion is a separable choice that amplifies the mundane_as_monumental effect."
      confidence: medium

  notes: |
    The routine's closer and its strongest laugh. The figurative_to_literal reading_switch is load-bearing: the childhood phrase 'ruin your appetite' treats 'ruin' as figuratively catastrophic (you've destroyed something precious). The adult reframe literalizes it — appetite is just a temporary state that regenerates. The mundane_as_monumental template continues: appetites are discussed with the gravity of natural resource management ('no danger in running out,' 'millions of them'). The escalation from 'another one coming right behind it' to 'no danger' to 'millions' to 'I'll ruin them whenever I want' builds the defiant triumph. Both existing registry concepts (appetite_ruining, adult_cookie_freedom) apply.
