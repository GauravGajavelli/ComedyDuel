    transcript_fragment: >
      My parents live in Florida now. They moved there last year. They
      didn't want to move to Florida, but they're in their sixties, and
      that's the law.

    joke:
      content:
        primary_domain: [social_ritual, aging]
        concepts: [retirement_migration]
        pivot_concept: retirement_migration
        specificity:
          default_level: 3
          trajectory: null
        content_moves: []

      logic:
        setup_expectation: >
          "My parents live in Florida now" sets up a mundane biographical
          fact. "They didn't want to move to Florida" introduces a mild
          tension — why did they move if they didn't want to? The audience
          expects a personal or financial reason (health, cost of living,
          being near family).
        punchline_violation: >
          "They're in their sixties, and that's the law" reframes the
          well-known cultural pattern of retirees moving to Florida as
          if it were a legal mandate rather than a voluntary social trend.
          The humor is in treating a loose demographic tendency as a
          binding legal obligation. The audience recognizes the pattern
          (old people move to Florida) but the framing as "the law" is
          the comic angle.

        pivot_mechanism:
          operation: reinterpretation
          operation_alternative: null
          # TEST: Two readings of the same material.
          # Reading 1 (setup): retirement migration is a voluntary social
          # pattern — people choose to move south for warmth, leisure, etc.
          # Reading 2 (punchline): retirement migration is a mandatory
          # legal requirement — once you hit sixty, you MUST relocate.
          # Same phenomenon (old people moving to Florida), two frames
          # (voluntary choice vs. legal compulsion). Nothing is negated;
          # the pattern is reread as compulsory.
          reading_switch: none
          scale_shift: none
          # STRICT TEST: The reinterpretation from social-pattern to legal-
          # mandate is the joke. Could I swap to expansion? The joke is
          # not about lifting a personal observation to universal principle;
          # it's about reframing the nature of the phenomenon. The scale
          # doesn't change — it was already about a demographic-level
          # pattern. Set to none.
          wordplay: none

        setup_frame: establishes_convention
        # "Old people move to Florida" is a convention the audience already
        # holds. Jerry doesn't need to establish this belief; the audience
        # recognizes it as a cultural truism without being told.

        pivot_locus: logical
        resolution_requires: [shared_experience, world_knowledge]

      structure:
        primary_template: mundane_as_monumental
        # The rhetorical shape: a mundane social pattern (retirement
        # migration) is given the gravity and authority of law. The
        # register of legal obligation is applied to a trivial
        # demographic trend.
        secondary_templates: []
        subversions_applied: []
        has_tag: false
        tag_operation: null
        tag_has_own_pivot: null
        act_out:
          present: false
          character_type: null
          register_gap: null
          character_gloss: ""

      relational:
        positioning:
          default: lateral_observer
          trajectory: null
        audience_implication: co_observer
        # The audience recognizes the retirement-to-Florida pattern. Jerry
        # names it from alongside them.
        shared_experience:
          required: true
          universality: common
          # Not truly universal — requires knowledge of the American
          # cultural pattern of retirees moving to Florida.
          comprehensibility_without_experience: 3
        performed_relatability:
          present: true
          # "You know how it works" — direct shared-experience gesture.

