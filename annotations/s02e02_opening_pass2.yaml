          default_level: 3
          trajectory: null
        content_moves: []

      logic:
        setup_expectation: >
          "The conversation's so boring" and "you start to fantasize"
          sets up a boredom scenario at a family gathering. The audience
          expects the fantasy to be something mundane or relatable —
          daydreaming about being elsewhere, thinking about TV, checking
          out mentally. "You start to fantasize" implies a gentle,
          familiar mental escape.
        punchline_violation: >
          The fantasy is violently physical — jumping out a window and
          crashing through glass. The scale of the escape response is
          wildly disproportionate to the stimulus (boring conversation).
          The humor is in the mismatch between the mundane provocation
          (dull family talk) and the extreme, self-destructive response
          (defenestration). The audience recognizes the impulse (wanting
          to escape boring gatherings) but the specific form of the
          fantasy is absurdly escalated.

