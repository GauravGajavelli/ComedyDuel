      adversarial:
        counterarguments_considered:
          - alternative: "Could be mapping — cheque mapped to mother's note as two domains."
            why_rejected: >
              Mapping requires two distinct domains with a revealed structural
              parallel where the aptness is the joke. Here, the cheque is not
              being compared to a separate domain — it is being REREAD as
              something it already implicitly is. The humor is in seeing the
              cheque differently (a plea rather than a payment), not in
              connecting two separate domains. The mother's note is the
              VEHICLE for the reinterpretation, not a mapping target.
          - alternative: "Scale_shift should be contraction — financial instrument deflated to pathetic plea."
            why_rejected: >
              Strict swap test: could this reinterpretation work with expansion
              instead of contraction? The reinterpretation IS the deflation —
              seeing a cheque as a plea IS the move from legitimate to
              pathetic. Swapping to expansion while keeping the same
              reinterpretation is inconceivable — the identity of this
              specific reinterpretation is the diminishment. The contraction
              is fused with the operation. Set to none.
        confidence: high

    notes: >
      The key distinction from mapping: Jerry is not saying "cheques are LIKE
      mother's notes" in a way that illuminates a parallel between two
      independent domains. He is saying "when you really look at what a cheque
      IS, it's a plea." The mother's note is the concrete realization of the
      reinterpretation, not a separate domain being mapped to. The act-out
      extends across jokes 03 and 04 as a continuous character voice.

