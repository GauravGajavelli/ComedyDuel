  # ==========================================================================
  # JOKE 03 — A cheque is like a note from your mother
  # ==========================================================================

  - joke_id: "seinfeld_s01e02_opening_03"
    source:
      work: "Seinfeld S01E02 'The Stakeout' opening monologue"
      medium: sitcom_opener
      year: 1990

    annotation_status:
      transcription: complete
      decomposition: complete
      performance: incomplete
      commutation: incomplete
      adversarial_review: incomplete
      voice_attribution: incomplete

    transcript_fragment: >
      I think to a man, a cheque is like a note from your mother that says
      "I don't have any money, but if you'll contact these people, I'm sure
      they'll stick up for me... If you just trust me this one time I don't
      have any money but I have these..."

    joke:
      content:
        primary_domain: [gender_dynamics, money_and_commerce]
        concepts: [cheque_writing, cheque_as_plea]
        pivot_concept: cheque_as_plea
        specificity:
          default_level: 4
          trajectory: null
        content_moves: []

      logic:
        setup_expectation: >
          A cheque is understood as a standard financial instrument — a
          legitimate, adult form of payment. The setup "there's something
          about a cheque that, to a man, is not masculine" primes the audience
          for an explanation of the unease men feel writing cheques.
        punchline_violation: >
          The cheque is reinterpreted as a pathetic plea — a note from your
          mother explaining that you don't have real money and asking the
          recipient to trust you. Reading 1 (setup frame): cheque = financial
          instrument backed by a bank. Reading 2 (punchline frame): cheque =
          a confession that you don't actually have money, just a promise
          written on paper. The same object is reread under a frame of
          vulnerability and dependency rather than financial competence.
        pivot_mechanism:
          operation: reinterpretation
          operation_alternative: null
          reading_switch: none
          scale_shift: none
          wordplay: none
        setup_frame: establishes_convention
        pivot_locus: logical
        resolution_requires: [shared_experience, world_knowledge]

      structure:
        primary_template: comparison
        secondary_templates: []
        subversions_applied: []
        has_tag: true
        tag_operation: extends
        tag_has_own_pivot: true
        act_out:
          present: true
          character_type: innocent
          register_gap: unaware_of_absurdity
          character_gloss: >
            A man presenting a cheque as if making a pathetic personal appeal,
            channeling a child handing a teacher a note from mom. The
            character is earnestly pleading — unaware that this plea is what
            a cheque actually IS in this reframing.

      relational:
        positioning:
          default: lateral_observer
          trajectory: null
        audience_implication: co_observer
