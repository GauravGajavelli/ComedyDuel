jokes:
- joke_id: s01e05_opening_01
  text: 'Never liked the check at the end of the meal system, because money''s a very
    different thing before and after you eat. Before you eat money has no value.

    '
  setup_expectation: '"Money is a different thing before and after you eat" sets up
    a comparison. The audience expects a relatable observation about how spending
    feels different on a full stomach vs. an empty one — a psychological or emotional
    distinction.

    '
  punchline_violation: '"Before you eat money has no value" doesn''t describe a feeling
    — it states it as an absolute economic fact. Hunger doesn''t merely change your
    attitude toward money; it annihilates money''s value entirely. The subjective
    experience of not caring about cost is reframed as an objective property of money
    itself.

    '
  pivot_locus: logical
  pivot_concept: money_value_hunger
  pivot_mechanism:
    operation: reinterpretation
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_convention
  primary_template: mundane_as_monumental
  difficulties: 'The operation call between reinterpretation and articulation was
    close. The "money has no value" observation does voice a shared truth (we all
    feel this way when hungry). But the humor is load-bearing on the SHIFT from psychological
    to ontological framing — it''s not just "yes, exactly," it''s "I didn''t think
    of it that way." That tips it to reinterpretation. The scale_shift: expansion
    is also debatable — you could argue the punchline stays at the same scope (personal
    dining) and doesn''t truly universalize. I tagged expansion because the move from
    "feels different" to "has no value" lifts a feeling to a quasi-universal economic
    principle.

    '
  physical_performance: null
  act_out:
    present: false
    character_type: null
    character_register: null
    register_gap: null
    character_gloss: null
- joke_id: s01e05_opening_02
  text: 'And you don''t care about money when you''re hungry, you sit down at a restaurant.
    You''re like the ruler of an empire. "More drinks, appetizers, quickly, quickly!
    It will be the greatest meal of our lives."

    '
  setup_expectation: '"You don''t care about money when you''re hungry" continues
    the relatable observation. The audience expects a description of typical over-ordering
    behavior — something grounded in the everyday dining experience.

    '
  punchline_violation: '"You''re like the ruler of an empire" maps the hungry diner
    onto a sovereign issuing imperial commands. The act-out ("More drinks, appetizers,
    quickly, quickly!") commits fully to the imperial register, escalating the mapping
    through performed grandiosity.

    '
  pivot_locus: logical
  pivot_concept: hungry_diner_as_sovereign
  pivot_mechanism:
    operation: mapping
    reading_switch: none
    scale_shift: expansion
  setup_frame: establishes_premise
  primary_template: mundane_as_monumental
  difficulties: 'The mapping vs. transplant distinction required the aptness test.
    Would the joke still work if the imperial framework genuinely fit? Yes — the joke
    works BECAUSE the parallel is apt (hungry diners really do act imperious). That
    confirms mapping over transplant. The tag/act-out ("More drinks... greatest meal
    of our lives") uses escalation as a secondary template, building specificity within
    the imperial frame. I classified the primary template as mundane_as_monumental
    rather than escalation because the escalation serves the elevation, not the other
    way around.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: authority
    character_register: confident
    register_gap: treats_mundane_as_serious
    character_gloss: 'Jerry voices the hungry diner as "the ruler of an empire," issuing
      imperious commands to waitstaff: "More drinks, appetizers, quickly, quickly!
      It will be the greatest meal of our lives." The character type is authority
      — someone with power issuing commands — because the mapping explicitly casts
      the diner as a sovereign. The register is confident (assured, declarative commands
      with no hesitation). The register gap is treats_mundane_as_serious because ordering
      food at a restaurant is treated with the gravity of an imperial decree; the
      grandiose declaration "the greatest meal of our lives" applies historic-occasion
      weight to an ordinary dinner.

      '
- joke_id: s01e05_opening_03
  text: 'Then after the meal, you know, you''ve got the pants open, you''ve got the
    napkins destroyed, cigarette butt in the mashed potatoes — then the check comes
    at that moment. People are always upset, you know. They''re mystified by the check.
    "What is this? How could this be?"

    '
  setup_expectation: 'The post-meal image (pants open, napkins destroyed, cigarette
    butt in mashed potatoes) establishes that the diner has thoroughly consumed and
    enjoyed everything ordered. The audience expects the check to be met with rueful
    acknowledgment — you ate it all, you knew the prices, you pay.

    '
  punchline_violation: 'Instead of resigned acceptance, people react with genuine
    mystification, as if the check is an inexplicable document. "What is this? How
    could this be?" treats the entirely predictable bill as a shocking, baffling event.
    The person who ordered everything is now unable to comprehend the bill for everything.

    '
  pivot_locus: logical
  pivot_concept: post_satiation_amnesia
  pivot_mechanism:
    operation: negation
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_convention
  primary_template: mundane_as_monumental
  difficulties: 'The operation choice between negation and reinterpretation was the
    hardest call here. The case for reinterpretation: the check is the "same material"
    being read differently before vs. after eating. The case for negation: the setup
    implies the diner will recognize the bill (they ordered it), and the punchline
    asserts they do NOT recognize it. I chose negation because the core humor is in
    the CONTRADICTION between "you ordered all this" and "you don''t recognize the
    bill" — a truth-value flip on self-awareness, not a frame shift on the same object.
    This is close enough to warrant logging in the decision log.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: bewildered
    register_gap: unaware_of_absurdity
    character_gloss: 'Jerry voices the post-meal diner confronted by the check, reacting
      with genuine mystification: "What is this? How could this be?" The character
      is an everyman (a regular diner in a recognizable situation) speaking in a bewildered
      register — confused and disbelieving, as though the check is an incomprehensible
      document rather than the predictable result of everything they just ordered.
      The register gap is unaware_of_absurdity because the character genuinely cannot
      fathom the bill despite having personally ordered every item on it.

      '
- joke_id: s01e05_opening_04
  text: 'They start passing it around the table, "Does this look right to you? We''re
    not hungry now. Why are we buying all this food?!"

    '
  setup_expectation: 'The preceding mystification sets up more of the same bewildered
    behavior. The audience expects the confusion to continue in the same register
    — more bafflement at the total, maybe a complaint about prices.

    '
  punchline_violation: '"We''re not hungry now. Why are we buying all this food?!"
    reframes the complaint as genuinely logical from the post-meal perspective. It''s
    not that the prices are wrong — it''s that buying food when you''re no longer
    hungry is irrational. The punchline takes the post-satiation psychology and follows
    it to its absurd but internally consistent conclusion: if you''re full, purchasing
    food makes no sense, therefore the entire transaction is illegitimate.

    '
  pivot_locus: logical
  pivot_concept: temporal_logic_of_need
  pivot_mechanism:
    operation: extension
    reading_switch: none
    scale_shift: none
  setup_frame: establishes_premise
  primary_template: reductio
  difficulties: 'Extension vs. reinterpretation was the key decision. The case for
    reinterpretation: you could argue the "same material" (the check) is being read
    under a different frame (present-need vs. past-order). But the humor doesn''t
    come from seeing the check differently — it comes from FOLLOWING the post-satiation
    logic to its absurd end. The premise "current hunger should determine purchases"
    is accepted and pushed to "therefore this completed meal was an error." That''s
    textbook extension. The template choice (reductio vs. escalation) was cleaner
    — the joke has an argumentative structure ending in absurdity, not an accumulating
    list. Reductio + extension is the documented co-occurrence pattern from the templates
    vocabulary.

    '
  physical_performance: null
  act_out:
    present: true
    character_type: everyman
    character_register: bewildered
    register_gap: unaware_of_absurdity
    character_gloss: 'Jerry voices the diner passing the check around the table in
      continued disbelief: "Does this look right to you? We''re not hungry now. Why
      are we buying all this food?!" The character is again an everyman, still bewildered,
      but now the bewilderment has escalated into a logically absurd but internally
      sincere argument: since we are no longer hungry, purchasing food was irrational.
      The register gap remains unaware_of_absurdity because the character presents
      post-satiation logic as a genuine grievance, completely unaware that the argument
      is nonsensical — you ordered the food when you WERE hungry, and the transaction
      is already complete.

      '
