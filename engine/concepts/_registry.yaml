# ============================================================================
# EXCLUDED STRINGS (mechanism descriptions, not concepts)
# ============================================================================
#
# The following strings appeared in annotations but are descriptions of
# humor mechanisms or emotional states, not content concepts. They should
# NOT be in the concept graph — they belong in structural/logic fields:
#
#   absurdity, comparison, inadequacy, understatement, sarcasm,
#   normalcy_bias, anticipation, disappointment, confusion, regret,
#   escape_fantasy, social_norms, preparation, searching, absence,
#   phone_call, dead_stop, ground_level_detail, regression,
#   self_blame (when describing the joke's mechanism, not its content)
#
# If these appear in future annotations, redirect:
#   - absurdity → likely describes the operation (extension) not a concept
#   - comparison → likely describes the template, not a concept
#   - anticipation/disappointment → likely describes setup_frame or affect
