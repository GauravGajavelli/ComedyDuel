# Concept Registry — ComedyDuel
#
# Every concept referenced in annotations must have an entry here.
# Annotations use node_id values from this registry, NOT ad-hoc strings.
#
# Node format:
#   node_id: normalized string (lowercase, underscores, plural for countable)
#   gloss: one-line human-readable description
#   domain: primary subject domain(s)
#   specificity: 1-5 (from vocabularies/specificity.yaml)
#   aliases: [] — prior annotation strings that map to this node
#
# GRANULARITY RULE: a concept should be at the level where substituting
# a sibling concept would change the joke's humor. Too broad: "traffic"
# (many different traffic jokes). Too narrow: "lane_changing_on_I95"
# (works on any highway). Right level: "lane_changing" — load-bearing grain.
#
# OPEN RECEIVING SURFACE: concepts may arrive from multiple sources (annotation,
# COMET-ATOMIC, external APIs) but all must pass the granularity rule above.
#
# Built from 231 concept references across 55 annotated laugh-points (v0.9).
# Strings that are DESCRIPTIONS of humor mechanisms (absurdity, comparison,
# inadequacy, understatement) are excluded — those belong in the schema's
# structural fields, not in the concept graph.

