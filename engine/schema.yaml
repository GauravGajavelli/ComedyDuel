# Comedy Duel — Annotation Schema v0.9
#
# This file defines the shape of a joke annotation. One annotation per joke,
# stored as YAML in annotations/{joke_id}.yaml.
#
# ============================================================================
# GLOSS vs STRUCTURED — read before annotating
# ============================================================================
#
# Every field in this schema is marked as one of two kinds:
#
#   [STRUCTURED] — The engine uses this. Drawn from controlled vocabularies,
#     bounded scales, enumerated categories, or typed references. Values must
#     match vocabulary entries or be declared as new vocabulary additions.
#     These are what the discovery and selection stages compute on.
#
#   [GLOSS] — The engine does NOT use this. Free text describing the specific
#     content of this joke, for human readability during blind reconstruction,
#     adversarial review, and weekly review. Gloss fields exist so you can
#     re-read a six-week-old annotation without revisiting the original joke.
#     They also exist as a diagnostic: if a joke's distinctiveness lives
#     entirely in gloss fields with no structured counterpart, the structured
#     fields are under-specified and the schema has a hole.
#
# The generative sufficiency test operates against STRUCTURED fields only.
# When verifying the schema can reconstruct a joke, read only the structured
# fields. If you can't, the schema needs more structure, not more gloss.
#
# ============================================================================
# Architectural levels — read before adding or moving fields
# ============================================================================
#
# The schema has two top-level blocks (JOKE and PERFORMANCE) with layers
# inside each. Every field must be placed at the correct block and layer.
# The following rules govern placement.
#
# --- BLOCK ASSIGNMENT (joke vs performance) ---
#
# The test: "If two different performers delivered this joke, would this
# field have the same value?"
#   - Same value regardless of performer → JOKE block
#   - Different value depending on performer → PERFORMANCE block
#
# Edge cases: some fields have a textual component (JOKE) and a delivery
# component (PERFORMANCE). In these cases, split the field: the textual
# property goes in JOKE, the delivery-variable property goes in
# PERFORMANCE as a deviation or intensity marker.
#
# --- LAYER ASSIGNMENT (within a block) ---
#
# JOKE layers:
#   content  — WHAT the joke is about (concepts, domains, specificity)
#   logic    — HOW the joke's mechanism works (operation, setup_frame,
#              pivot_locus). The cognitive machinery.
#   structure — the SHAPE of the joke as discourse (template, tag,
#              subversions, act-out character construction)
#   relational — the STANCE the joke's text establishes between comedian,
#              audience, and subject (positioning, audience role, shared
#              experience requirements). NEW in v0.9.
#   narrative — CONNECTIONS to other jokes (callbacks, routine membership)
#
# PERFORMANCE layers:
#   delivery  — HOW the joke is physically/vocally delivered (cadence,
#              pauses, register shifts, act-out voice realization)
#   voice     — the performer's IDENTITY markers (persona, register)
#   affective — the EMOTIONAL register (valence, arousal, trajectory)
#   relational — performer-variable DELIVERY of the relational stance
#              (vulnerability commitment, relatability intensity)
#
# --- WITHIN-LAYER RULES ---
#
# OPERATIONS (pivot_mechanism.operation):
#   - Describe the COGNITIVE SHIFT the punchline performs on the audience's
#     frame. "What does the punchline DO to the setup's frame?"
#   - Mutually exclusive: one operation per joke at each pivot point
#   - Must be a frame-level phenomenon, not a word-level mechanism
#   - NOTE: articulation is the "null operation" — it describes
#     cognitive RECOGNITION, not a frame shift. It is pragmatically
#     necessary to prevent false reinterpretation classifications.
#     Its theoretical grounding (social bonding / benign violation of
#     silence) is different from the other 5 operations (all
#     incongruity-based).
#
# MODIFIERS (reading_switch, scale_shift, wordplay):
#   - Describe HOW the pivot is delivered, orthogonal to which operation
#   - Must be independently specifiable: any modifier can co-occur with
#     any operation (or the test must document the entanglement)
#   - A modifier is NOT an operation if it can accompany multiple different
#     operations. If a proposed modifier can ONLY co-occur with one
#     operation, it may be a sub-type of that operation, not a modifier
#   - KNOWN ENTANGLEMENT: reading_switch gravitates heavily toward
#     reinterpretation and is near-incompatible with articulation.
#     This is documented, not a design flaw — figurative_to_literal
#     IS a form of reinterpretation at the cognitive level.
#
# TEMPLATES (primary_template):
#   - Describe the RHETORICAL SHAPE of the joke — how it unfolds as
#     discourse. "What structural pattern does the joke follow?"
#   - Must be about discourse structure, NOT about content domain
#     (what the joke is about) or cognitive mechanism (what shift occurs)
#   - A template is NOT an operation if the same template can house
#     different cognitive operations. If a proposed template always
#     co-occurs with one specific operation, they may be the same thing
#     described at different levels — verify with counter-examples
#   - A template is NOT a content tag if it could apply to jokes about
#     completely different subjects. If a proposed template only applies
#     to jokes about a specific subject, it's a content property
#
# --- REPRODUCIBILITY REQUIREMENT ---
#
# Every [STRUCTURED] field must have a reproducibility mechanism — a
# defined way for two independent annotators to converge on the same
# value. The mechanism varies by field type:
#
#   Controlled vocabulary fields (operation, template, positioning, etc.):
#     Reproducibility comes from the vocabulary definition: criterion,
#     positive example, negative example, distinguished_from. If two
#     annotators read the same vocabulary file and apply it to the same
#     joke, they should usually agree. Inter-annotator agreement target:
#     ≥80% on controlled vocabulary fields.
#
#   Testable fields (operation, reading_switch, wordplay):
#     Reproducibility comes from a concrete test that produces a written
#     artifact. If the test produces the artifact, the value fits. If it
#     doesn't, it doesn't. Tests are the strongest reproducibility
#     mechanism.
#
#   Scale fields (vulnerability, specificity, comprehensibility, etc.):
#     Reproducibility comes from anchor descriptions at each integer
#     value. Annotators calibrate against the anchors.
#
#   Free-reference fields (concepts, pivot_concept):
#     These reference an open vocabulary (the concept graph) rather than
#     a closed controlled vocabulary. Reproducibility requires:
#     (a) A REGISTRY of existing nodes to match against before creating
#         new ones (engine/concepts/_registry.yaml)
#     (b) NORMALIZATION rules for node IDs (lowercase, underscores,
#         plural for countable)
#     (c) A GRANULARITY standard: concepts should be at the level where
#         swapping the concept for a sibling would change the joke's
#         humor. "traffic" is too broad (many different traffic jokes
#         work differently). "lane_changing_during_rush_hour_on_I-95"
#         is too narrow (the joke would work on any highway). The right
#         level is where the concept does load-bearing work in the
#         joke's mechanism.
#     (d) For pivot_concept specifically: "which concept is doing the
#         load-bearing recontextualization work?" If you removed this
#         concept and substituted another, would the joke's operation
#         break? If yes, it's the pivot concept.
#
# --- SYNONYMY AND AGREEMENT ---
#
# Reproducibility does NOT require identical strings — it requires
# convergence to the same MEANING. Two types of surface disagreement
# are acceptable:
#
#   SYNONYMOUS STRINGS: Two annotators write different words for the
#     same concept (e.g., "cheque" vs "check" vs "cheque_writing").
#     This is resolved by the concept registry's alias system — all
#     three map to the same node_id. Synonymy is NOT a reproducibility
#     failure. The test is: "do these strings resolve to the same
#     registry node?" If yes, the annotators agree.
#
#   EQUIVALENT CONTROLLED-VOCABULARY VALUES: For fields with
#     distinguished_from blocks, if two annotators pick different
#     values but both acknowledge the other as a close alternative
#     (e.g., one picks reinterpretation and notes "close call with
#     articulation"), this is a BOUNDARY case, not a failure. The
#     schema tracks these via the adversarial.counterarguments_
#     considered field. Boundary cases signal where vocabulary
#     definitions need sharpening, not where annotators are wrong.
#
# Three types of disagreement ARE reproducibility failures:
#
#   GRANULARITY MISMATCH: One annotator writes "traffic" (too broad),
#     another writes "lane_changing" (correct grain). The substitution
#     test should resolve this — "traffic" fails because many traffic
#     jokes work differently and substituting "lane_changing" for
#     "traffic" doesn't break ANY of them.
#
#   CATEGORY CONFUSION: One annotator writes a mechanism description
#     as a concept ("absurdity", "comparison", "anticipation"). These
#     belong in structural/logic fields, not in the concept graph.
#     The registry's excluded-strings list catches these.
#
#   GENUINE DISAGREEMENT: Two annotators pick different operations
#     for the same joke and neither acknowledges the other as a close
#     alternative. This signals a vocabulary definition gap — the
#     distinguished_from blocks need strengthening.
#
#   [GLOSS] fields are exempt from reproducibility requirements — they
#   are human-readable reasoning traces, not engine inputs.
#
# When adding a new [STRUCTURED] field, specify which reproducibility
# mechanism applies and verify that the mechanism is sufficient for
# two annotators to converge.
#
# --- CROSS-LEVEL VALIDATION ---
#
# When adding a new field, ask:
# 1. Block test: same value regardless of performer? → JOKE. Varies? →
#    PERFORMANCE. Mixed? → split.
# 2. Layer test: is this about content, cognitive mechanism, discourse
#    shape, relational stance, or connections? Place accordingly.
# 3. Mutual exclusivity test (operations): can a joke be both this AND
#    another operation simultaneously at the same pivot? If yes, it's
#    not an operation — it may be a modifier or template.
# 4. Orthogonality test (modifiers): can this co-occur with all
#    operations? If it can only co-occur with one, it's a sub-type.
# 5. Shape-not-content test (templates): could this template apply to
#    jokes about completely different subjects? If not, it's a content
#    tag, not a template.
# 6. Redundancy test: does this field duplicate information already
#    captured by another field at a different level? If the two fields
#    always have the same value, one is redundant. Verify with
#    counter-examples where they diverge.
#
# ============================================================================
# Conventions
# ============================================================================
#
#   - {UNSPECIFIED} marks fields not yet populated in this pass
#   - null marks fields that don't apply to this joke (e.g., no tag, no callback)
#   - Controlled vocabularies live in engine/vocabularies/{name}.yaml
#   - Concept nodes live in engine/concepts/{node_id}.yaml
#   - Trajectory fields are optional. Use only when the property shifts
#     meaningfully across structural events and the shift is load-bearing.
#
# Changelog: working/schema-changelog.md
# Field-usage tracking: working/field-usage.md

# ============================================================================
# Identity and source
# ============================================================================

joke_id: ""                        # [STRUCTURED] e.g., seinfeld_s03e14_opening_01
source:
  work: ""                         # [GLOSS]      human-readable source description
  medium: ""                       # [STRUCTURED] from vocabularies/media.yaml
                                   #              stand_up | sitcom_opener |
                                   #              special | podcast | other
  year: null                       # [STRUCTURED] integer or null

# ============================================================================
# Annotation status (multi-pass workflow tracking)
# ============================================================================

annotation_status:                 # all [STRUCTURED]
  transcription: incomplete        # incomplete | complete
  decomposition: incomplete        # Pass 2: joke-level layers
  performance: incomplete          # Pass 3: performance-level layers
  commutation: incomplete          # Pass 4: load-bearing analysis
  adversarial_review: incomplete   # Pass 5: counterargument pass
  voice_attribution: incomplete    # weekly cross-cutting pass

# ============================================================================
# JOKE (the written/structural unit, independent of performance)
# ============================================================================
#
# Populated in Pass 2 (silent read). Would be the same across different
# performances of the same joke.

joke:

  # --- Content layer -------------------------------------------------------

  content:
    primary_domain: []             # [STRUCTURED] multi-select from
                                   #   vocabularies/domains.yaml
                                   #   e.g., [domestic_life, bureaucracy]

    concepts: []                   # [STRUCTURED] list of concept-node references.
                                   #   Each entry is a node_id from engine/concepts/.
                                   #
                                   #   REPRODUCIBILITY: free-reference field with
                                   #   alias resolution. Two annotators writing
                                   #   different strings for the same concept
                                   #   (e.g., "cheque" vs "check") is NOT a
                                   #   reproducibility failure — it's resolved by
                                   #   the registry's alias system. The test is:
                                   #   "do both strings resolve to the same
                                   #   registry node?"
                                   #
                                   #   LOOKUP PROCEDURE:
                                   #   1. Check engine/concepts/_registry.yaml for
                                   #      a node whose aliases include your string
                                   #   2. If found → use that node_id
                                   #   3. If not found → check if your string is a
                                   #      mechanism description (absurdity,
                                   #      comparison, anticipation, etc.) — these
                                   #      belong in structural/logic fields, NOT
                                   #      in concepts. See the registry's excluded-
                                   #      strings list.
                                   #   4. If genuinely new concept → create a
                                   #      provisional entry using a normalized
                                   #      string (lowercase, underscores, plural
                                   #      for countable). Apply the granularity
                                   #      test below.
                                   #
                                   #   GRANULARITY TEST: "If I substituted a
                                   #   sibling concept, would the joke's humor
                                   #   change?" Too broad: "traffic" (many
                                   #   traffic jokes work differently). Too narrow:
                                   #   "lane_changing_on_I95" (works on any
                                   #   highway). Right: "lane_changing" — load-
                                   #   bearing grain.
                                   #
                                   #   DO NOT include mechanism descriptions as
                                   #   concepts. "absurdity", "comparison",
                                   #   "inadequacy", "understatement" describe
                                   #   how the joke works, not what it's about.

    pivot_concept: null            # [STRUCTURED] concept-node reference.
                                   #   The concept doing the load-bearing
                                   #   recontextualization work at the pivot.
                                   #
                                   #   REPRODUCIBILITY TEST: if you removed this
                                   #   concept and substituted another, would the
                                   #   joke's operation break? If yes, this is the
                                   #   pivot concept. If the joke would still work
                                   #   with a different concept in this slot, the
                                   #   pivot concept might be more abstract than
                                   #   what you named.
                                   #
                                   #   null when pivot is purely affective with no
                                   #   concept anchor.

    specificity:
      default_level: null          # [STRUCTURED] integer 1-5
      trajectory: null             # [STRUCTURED] optional list of {at, level}

    content_moves: []              # [STRUCTURED] Content-level techniques that
                                   #   are about WHAT the joke does with its
                                   #   subject, not about rhetorical shape.
                                   #   Values:
                                   #
                                   #   anthropomorphization — treats a non-human
                                   #     entity as if it had human characteristics.
                                   #     Moved from templates (v0.9) because it
                                   #     describes content domain treatment, not
                                   #     rhetorical shape. A joke can
                                   #     anthropomorphize within any template
                                   #     (escalation, reductio, comparison, etc.)

  # --- Logic layer ---------------------------------------------------------

  logic:
    setup_expectation: ""          # [GLOSS]      free text reasoning trace
    punchline_violation: ""        # [GLOSS]      free text reasoning trace

    pivot_mechanism:               # [STRUCTURED] Four orthogonal sub-dimensions.
                                   #   Values from vocabularies/pivot-mechanisms.yaml.

      operation: ""                # [STRUCTURED] required. Single-valued.
                                   #   negation | reinterpretation | transplant |
                                   #   mapping | extension | articulation

      operation_alternative: null  # [STRUCTURED] optional. Single-valued.
                                   #   null | negation | reinterpretation |
                                   #   transplant | mapping | extension |
                                   #   articulation
                                   #
                                   #   Populated ONLY when the annotator's
                                   #   confidence on the operation is medium or
                                   #   low. Records the next-best operation
                                   #   classification — the one that was
                                   #   seriously considered and narrowly rejected.
                                   #
                                   #   PURPOSE: enables the generation engine to
                                   #   branch on boundary cases. When non-null,
                                   #   the generator can produce candidate jokes
                                   #   from both the primary and alternative
                                   #   operations, then select the stronger
                                   #   output. This turns annotation ambiguity
                                   #   into generative variety.
                                   #
                                   #   WHEN TO POPULATE:
                                   #   - The annotator ran the operation tests
                                   #     and two operations produced plausible
                                   #     artifacts
                                   #   - The distinction required a judgment
                                   #     call rather than a clear test result
                                   #   - Typically: reinterpretation/articulation
                                   #     boundary in observational comedy
                                   #
                                   #   WHEN TO LEAVE NULL:
                                   #   - The primary operation's test produced
                                   #     a clean artifact and no other test came
                                   #     close
                                   #   - confidence is high
                                   #
                                   #   Added in v0.9.2.

      reading_switch: none         # [STRUCTURED] optional. Single-valued.
                                   #   none | figurative_to_literal |
                                   #   literal_to_figurative
                                   #
                                   #   KNOWN ENTANGLEMENT: gravitates toward
                                   #   reinterpretation. Near-incompatible with
                                   #   articulation. Document, don't suppress.

      scale_shift: none            # [STRUCTURED] optional. Single-valued.
                                   #   none | expansion | contraction
                                   #
                                   #   STRICT independence test (v0.9.1):
                                   #   "Could I SWAP the scale_shift direction
                                   #   (expansion ↔ contraction) while keeping
                                   #   the same operation, and the joke would
                                   #   still be recognizably the same joke?"
                                   #
                                   #   If swapping direction is CONCEIVABLE
                                   #   (the joke could work with the opposite
                                   #   scale movement) → scale_shift is
                                   #   independent, populate it.
                                   #
                                   #   If swapping direction is INCONCEIVABLE
                                   #   (a reinterpretation that reframes grand
                                   #   as trivial CANNOT work as grand-to-grander)
                                   #   → the scale change is fused with the
                                   #   operation, set to none.
                                   #
                                   #   Example — INDEPENDENT: "Wherever you are
                                   #   in life, you've gotta go" is
                                   #   reinterpretation + expansion. Could the
                                   #   same reinterpretation work with contraction
                                   #   instead? Yes — the social observation could
                                   #   be contracted to a personal quirk rather
                                   #   than expanded to a life principle. The
                                   #   expansion is a separable choice.
                                   #
                                   #   Example — FUSED: "To be out, this is out"
                                   #   is reinterpretation + contraction. Could
                                   #   this reinterpretation work with expansion?
                                   #   No — the reinterpretation IS the move from
                                   #   philosophical to trivial. Contraction is
                                   #   not a modifier here; it's what the
                                   #   reinterpretation does. Set to none.

      wordplay: none               # [STRUCTURED] optional. Single-valued.
                                   #   none | phonemic_pair | portmanteau |
                                   #   collocation_disruption
                                   #
                                   #   Delivery vehicle, not cognitive operation.
                                   #   Specific pun words NOT recorded.

    setup_frame: null              # [STRUCTURED]
                                   #   establishes_convention |
                                   #   establishes_behavior |
                                   #   establishes_expectation |
                                   #   establishes_premise |
                                   #   establishes_anomaly |
                                   #   establishes_sequence
                                   #
                                   #   PREMISE vs CONVENTION decision procedure:
                                   #   "Would the audience hold this belief
                                   #   WITHOUT the comedian stating it?"
                                   #   YES → convention (pre-existing norm)
                                   #   NO → premise (comedian asks audience to
                                   #     accept this for the bit to work)
                                   #
                                   #   "The middle finger is an insult" → the
                                   #   audience already believes this. Convention.
                                   #   "Body parts can be used as insults and
                                   #   effort correlates with insult severity" →
                                   #   the audience doesn't hold this until Jerry
                                   #   frames it. Premise.
                                   #
                                   #   PREMISE vs BEHAVIOR decision procedure:
                                   #   "Is the setup describing something people
                                   #   DO, or something the comedian CLAIMS?"
                                   #   People do it → behavior.
                                   #   Comedian claims it → premise.
                                   #   "Men are drawn to tool work" → behavior.
                                   #   "Fashion will eventually disappear" → premise.

    pivot_locus: ""                # [STRUCTURED] logical | affective | both

    resolution_requires: []        # [STRUCTURED] multi-select:
                                   #   shared_experience | world_knowledge |
                                   #   character_knowledge | wordplay_recognition |
                                   #   cultural_reference

  # --- Structure layer -----------------------------------------------------

  structure:
    primary_template: ""           # [STRUCTURED] from vocabularies/templates.yaml.
                                   #   Single-valued. The dominant rhetorical shape.
                                   #   Must describe DISCOURSE STRUCTURE, not
                                   #   content domain or cognitive mechanism.

    secondary_templates: []        # [STRUCTURED] multi-select from same vocab.

    # Subversions — TEXTUAL subversions only (v0.9).
    # register_break moved to performance.delivery (performer-specific).
    # anti_callback moved to joke.narrative (context-dependent).
    subversions_applied: []        # [STRUCTURED] list of {type, at}
                                   #   type: structural_refusal | meta_structural |
                                   #         specificity_subversion
                                   #   at: structural event name

    has_tag: false                 # [STRUCTURED] boolean

    tag_operation: null            # [STRUCTURED] What the tag does to its own
                                   #   punchline. Single-valued.
                                   #   extends | reframes | undercuts | null
                                   #   (v0.9: split from tag_function. The prior
                                   #   value callbacks_earlier moved to
                                   #   joke.narrative as tag_callbacks_to.)

    tag_has_own_pivot: null        # [STRUCTURED] boolean

    # --- Act-out sub-block (JOKE portion) -----------------------------------
    #
    # What the character IS and what structural gap the act-out creates.
    # These are determined by the joke's text, not by who performs it.
    # character_register moved to performance.delivery.act_out_voice (v0.9)
    # because how the performer VOICES the character varies by delivery.

    act_out:
      present: false               # [STRUCTURED] boolean
      character_type: null         # [STRUCTURED] authority | everyman |
                                   #   enthusiast | expert | innocent
      register_gap: null           # [STRUCTURED] treats_mundane_as_serious |
                                   #   treats_serious_as_mundane |
                                   #   unaware_of_absurdity |
                                   #   performed_sincerity | none
      character_gloss: ""          # [GLOSS]

  # --- Relational layer (NEW in v0.9) --------------------------------------
  #
  # The STANCE the joke's text establishes between comedian, audience, and
  # subject. These are textually determined — if two different performers
  # delivered this joke, these values would be the same. Moved from
  # performance.relational (v0.9 audit: the prior placement was incorrect
  # because these are properties of the joke's text, not the delivery).

  relational:
    positioning:
      default: ""                  # [STRUCTURED] from vocabularies/positioning.yaml
                                   #   lateral_observer | above | below | with
      trajectory: null             # [STRUCTURED] optional; list of {at, value}

    audience_implication: ""       # [STRUCTURED] co_observer | target |
                                   #   accomplice | witness

    shared_experience:
      required: null               # [STRUCTURED] boolean
      universality: null           # [STRUCTURED] universal | common | niche |
                                   #   performer_specific | null
      comprehensibility_without_experience: null
                                   # [STRUCTURED] integer 0-5

    performed_relatability:
      present: null                # [STRUCTURED] boolean — is a relatability
                                   #   gesture ("you know when you...") in the text?

  # --- Narrative layer -----------------------------------------------------

  narrative:
    callbacks_to: []               # [STRUCTURED] list of prior joke_ids
    callback_is_primary_pivot: null  # [STRUCTURED] boolean
    running_premise: null          # [STRUCTURED] named premise id
    tag_callbacks_to: null         # [STRUCTURED] joke_id or null. Populated
                                   #   when the tag references a prior joke.
                                   #   (v0.9: split from tag_function's
                                   #   callbacks_earlier value, which conflated
                                   #   tag-to-punchline relationship with
                                   #   tag-to-prior-joke relationship.)
    anti_callback: null            # [STRUCTURED] joke_id or null. Populated
                                   #   when a callback opportunity exists but
                                   #   is pointedly not taken. (v0.9: moved
                                   #   from subversions — context-dependent,
                                   #   depends on what was performed earlier.)

    routine_id: null               # [STRUCTURED]
    position_in_routine: null      # [STRUCTURED] integer
    routine_total_jokes: null      # [STRUCTURED] integer
    position_in_set: null          # [STRUCTURED] opener | mid_set | closer |
                                   #   standalone

# ============================================================================
# PERFORMANCE (specific to this delivery)
# ============================================================================
#
# Populated in Pass 3 (aloud read). Most values are DEVIATIONS from the
# performer's defaults in engine/performers/{performer}.yaml.

performance:

  performer: ""                    # [STRUCTURED] performer id

  # --- Delivery layer ------------------------------------------------------

  delivery:
    cadence: ""                    # [STRUCTURED] from vocabularies/cadence.yaml
    pause_placement: []            # [STRUCTURED] multi-select
    repetition: null               # [STRUCTURED] null or {phrase_gloss, count, at}
    vocal_register_shifts: []      # [STRUCTURED] list of {at, direction}
    estimated_duration_seconds: null  # [STRUCTURED]

    # Register break (v0.9: moved from subversions — performer-specific.
    # What's a register break for Mort is baseline for Cece.)
    register_break:
      present: false               # [STRUCTURED] boolean
      at: null                     # [STRUCTURED] structural event name
      direction: null              # [STRUCTURED] from vocabularies/register-shifts.yaml

    # Act-out voice realization (v0.9: split from joke.structure.act_out.
    # How the performer VOICES the character varies by delivery.
    # character_type and register_gap stay in joke.structure because they
    # are determined by the text.)
    act_out_voice:
      character_register: null     # [STRUCTURED] confident | bewildered |
                                   #   earnest | bureaucratic | casual
                                   #   How the performer voices the character.
                                   #   The same joke text could be delivered
                                   #   with different character registers by
                                   #   different performers.

  # --- Voice layer ---------------------------------------------------------

  voice:
    persona_markers: []            # [STRUCTURED] deviations only
    signature_phrases: []          # [GLOSS]
    register: ""                   # [STRUCTURED] `default` or value
    editorializes:
      present: null                # [STRUCTURED] true | false
