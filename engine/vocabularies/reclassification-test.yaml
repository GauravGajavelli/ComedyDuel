  old_system:
    incongruity_type: category_error
    confidence: low
    problem: "Same issue as the holster — the humor is in the aptness of the comparison (checks really DO function as IOUs / promissory notes), not in misapplication. The 'mother's note' framework doesn't fail to fit; it fits uncomfortably well."
  new_system:
