# ============================================================================
# RECLASSIFICATION TEST
# ============================================================================
# Every punchline/tag/topper from the 5 Seinfeld monologues, classified
# under the OLD system (incongruity_type) and the PROPOSED system
# (pivot_mechanism). This tests whether the new system eliminates the
# nebulousness while preserving (or improving) discriminating power.
# ============================================================================

# ============================================================================
# EPISODE 1: Good News Bad News — "Going out"
# ============================================================================

s01e01_beat1_punchline:
  text: "To be out, this is out...and out is one of the single most enjoyable experiences of life."
  old_system:
    incongruity_type: register_deflation
    confidence: medium
    problem: "Is this register_deflation (philosophical question → trivial tautology) or is it something else? The answer IS trivial, but calling it 'deflation' implies the answer fails to meet the setup's demands. Seinfeld treats it as a genuine insight. The criterion says 'refuses its tonal demands' but Seinfeld isn't refusing — he's answering sincerely from a different angle."
  new_system:
    operation: reinterpretation
    reading_switch: none
    scale_shift: contraction
    confidence: high
    why_cleaner: "Two clear, independent claims: (1) the setup frame ('why we're here' — existential) is reread under a different frame ('to be out' — spatial/social), and (2) the gravity contracts from philosophical to mundane. No need to decide whether the 'deflation' or the 'reinterpretation' is primary — both are recorded."

s01e01_beat1_tag:
  text: "This is what they're talking about...we're all out now, no one is home."
  old_system:
    incongruity_type: literalization
    confidence: medium
    problem: "Is this literalization? 'Going out' is treated literally, but is 'going out' really figurative in the first place? It's a common expression that's arguably already half-literal. The criterion says 'figurative language, idiom, or conventional figurative reading' — does 'going out' qualify?"
  new_system:
    operation: reinterpretation
    reading_switch: figurative_to_literal
    scale_shift: none
    confidence: high
    why_cleaner: "The operation is reinterpretation (same phrase, different reading). The reading_switch captures the literal/figurative aspect cleanly as a modifier. If 'going out' doesn't qualify as figurative, set reading_switch to none — the joke still has a clean operation classification regardless."

s01e01_beat2_punchline:
  text: "\"Did you ring?, I can't find him.\" \"Where did he go?\" \"He didn't tell me where he was going\"."
  old_system:
    incongruity_type: "???"
    confidence: low
    problem: "No type fits. This is performed shared experience — the audience recognizes the phone conversation. No frame switch, no truth-value flip, no reading-mode change, no domain import. The closest is probably 'reversal' (people expected to be found → they can't be) but that's a stretch."
  new_system:
    operation: articulation
    reading_switch: none
    scale_shift: none
    confidence: high
    why_cleaner: "This is textbook articulation. The humor is 'yes, that's exactly what people say.' No type-forcing required."

s01e01_beat3_punchline:
  text: "\"We gotta be getting back\"."
  old_system:
    incongruity_type: reversal
    confidence: high
    problem: "Clean reversal — one of the few where the old system works without friction."
  new_system:
    operation: negation
    reading_switch: none
    scale_shift: none
    confidence: high
    why_cleaner: "Equally clean. Negation = reversal renamed."

s01e01_beat3_tag:
  text: "Once you're out, you wanna get back! You wanna go to sleep, you wanna get up, you wanna go out again tomorrow, right?"
  old_system:
    incongruity_type: "???"
    confidence: low
    problem: "Is this reversal (extending the back-and-forth)? Scope_expansion (making the cycle universal)? Neither fits perfectly — it's really an escalation, but escalation is a template, not an incongruity type."
  new_system:
    operation: extension
    reading_switch: none
    scale_shift: none
    confidence: high
    why_cleaner: "The out-back-out premise is accepted and its cycle is followed forward. Textbook extension."

s01e01_beat3_topper:
  text: "Where ever you are in life, it's my feeling, you've gotta go."
  old_system:
    incongruity_type: scope_expansion
    confidence: medium
    problem: "Scope_expansion fits but the criterion requires 'the expansion itself to be the comedic mechanism, framed as revelation rather than extrapolation.' Is this revelation or extrapolation? Seinfeld frames it as both — personal ('it's my feeling') and universal ('wherever you are in life'). The criterion's distinction between revelation and extrapolation is exactly the kind of subjective judgment that makes the type nebulous."
  new_system:
    operation: reinterpretation
    reading_switch: none
    scale_shift: expansion
    confidence: high
    why_cleaner: "The social observation is reread as existential principle — that's the operation. The scope expands from specific to universal — that's the scale_shift. No need to decide whether the expansion 'qualifies as revelation.'"

