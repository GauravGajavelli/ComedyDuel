# ============================================================================

s01e02_beat2_punchline:
  text: "The keys, they can never find in their purse...but the cheque book they got that."
  old_system:
    incongruity_type: reversal
    confidence: medium
    problem: "Is this reversal? The setup implies women are fast with cheques. The punchline... confirms they're fast with cheques? The contrast with keys looks like reversal but the setup already told us they're fast — it's confirming, not negating. You could argue the implicit setup is 'women lose things in their purse' and the punchline reverses it for cheques specifically. But that's reading in an unstated setup."
  new_system:
    operation: reinterpretation
    reading_switch: none
    scale_shift: none
    confidence: high
    why_cleaner: "The purse is reread: it's not uniformly disorganized (default frame) — it has a hierarchy where the cheque book has privileged status. Same referent (purse), different organizational frame."

s01e02_beat2_tag:
  text: "the cheque book comes out of a holster"
  old_system:
    incongruity_type: category_error
    confidence: low
    problem: "Category_error says 'imports a foreign framework where it doesn't belong — the humor is in the misapplication.' But the humor ISN'T in misapplication — the holster comparison works BECAUSE the parallel is apt (speed, readiness, efficiency). The gunslinger framework isn't being misapplied; it's illuminating something true about how women handle cheque books. No existing type captures analogy."
  new_system:
    operation: mapping
    reading_switch: none
    scale_shift: none
    confidence: high
    why_cleaner: "Source: gunslinger quick-draw. Target: cheque book retrieval. Shared structure: speed + practiced readiness. The parallel is apt, not misapplied. Mapping captures this exactly."

s01e02_beat2_topper:
