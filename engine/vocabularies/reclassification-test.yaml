  old_system:
    incongruity_type: "???"
    confidence: low
    problem: "This sustains the holster analogy through performance. The old system has no clean type for 'extending an established comparison through act-out.' It's not a new mechanism; it's continuation."
  new_system:
    operation: mapping
    reading_switch: none
    scale_shift: none
    confidence: high
    why_cleaner: "Same mapping sustained. The act-out extends the source-target parallel into performed speech."

s01e02_beat3_punchline:
