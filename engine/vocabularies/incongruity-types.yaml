# Incongruity Types
#
# The mechanism by which the punchline violates the setup.
# Referenced by schema: joke.logic.incongruity_type
#
# Single-valued. Mutually exclusive. See README.md for definition format.

reversal:
  criterion: |
    The punchline affirms the negation of what the setup established.
    A claim is set up; the punchline flips its truth value. The setup's
    content becomes false (or its opposite becomes true) by the end.

  positive_example: |
    "I used to do drugs. I still do, but I used to, too." (Mitch Hedberg)
    Setup establishes "used to" (implying past-only, no longer). Punchline
    affirms both past and present states, negating the implied
    no-longer. The truth value of the setup's implicit claim is flipped.

  negative_example: |
    "I saw a sign that said 'Watch for children.' I thought, that sounds
    like a fair trade." (Mitch Hedberg)
    Looks like reversal because there's a sharp turn, but this is
    LITERALIZATION. Nothing is negated — the sign's text is accepted
    as-is and re-read with a different interpretive frame. Classify
    as literalization, not reversal.

  distinguished_from:
    reframe: |
      Reversal operates on truth-values (X becomes not-X). Reframe
      operates on interpretation (X is now understood as Y, but X is
      still true). Test: if the setup's claim is still true in the
      punchline but means something different, it's reframe. If the
      setup's claim is negated or contradicted, it's reversal.

    literalization: |
      Literalization is a specific kind of reframe — a figurative
      reading gets replaced by a literal one. If the turn is about
      reading mode (figurative vs literal), classify as literalization
      regardless of whether anything gets negated in the process.

    category_error: |
      Category_error imports a framework from one domain to another in
      a way that doesn't fit. No truth-value flip, just a domain
      mismatch. Test: is something being negated, or is an inappropriate
      framework being applied?

reframe:
  criterion: |
    The setup establishes an interpretation of its content; the
    punchline reveals or substitutes a different interpretation of
    the same content. The setup's literal content remains true; what
    changes is what it MEANS.

  positive_example: |
    A joke where someone describes their morning routine as a series
    of small failures, ending by reframing the whole thing as "my
    commute." The morning activities are still what was described;
    the frame shifts from "bad morning" to "normal commute."

  negative_example: |
    "I used to be indecisive. Now I'm not so sure." (Tommy Cooper)
    Looks like reframe because there's a shift, but this is REVERSAL.
    The claim of having changed is negated by "now I'm not so sure" —
    the past state is still present. Truth value flipped, not
    interpretation shifted.

  distinguished_from:
    reversal: |
      See reversal's distinguished_from.

    literalization: |
      Literalization is a subset of reframe. Use literalization when
      the specific move is a figurative-to-literal reading switch.
      Use reframe when the switch is between two interpretations,
      neither of which is a literalization.

    category_error: |
      Reframe shifts a reading within the same domain. Category_error
      imports a framework from a different domain. Test: does the
      punchline stay within the setup's conceptual territory
      (reframe), or drag in a framework from elsewhere
      (category_error)?

literalization:
  criterion: |
    A specific kind of reframe: the setup uses figurative language,
    idiom, or conventional figurative reading; the punchline treats
    it literally, as if the figurative reading weren't available.

  positive_example: |
    "I haven't slept for ten days, because that would be too long."
    (Mitch Hedberg)
    The idiom "haven't slept for days" is conventionally figurative
    (meaning poor sleep). Punchline treats it literally as
    "ten consecutive days of being awake," and notes that would be
    impossible. Figurative reading replaced with literal.

  negative_example: |
    "What's the deal with airline food?"
    Looks like it might be literalization (taking "deal" literally)
    but isn't — the "deal with X" frame is being applied to trivial
    subject matter, not being read literally. Classify as
    MUNDANE_AS_MONUMENTAL (a template, not an incongruity type) or
    category_error depending on what you're tagging.

  distinguished_from:
    reframe: |
      Literalization is a proper subset of reframe. Use literalization
      when the reading-mode switch is figurative-to-literal. Use
      reframe for other kinds of interpretation shifts.

    figuration: |
      Figuration is the opposite direction: literal setup, figurative
      punchline. Same mechanism, inverted.

category_error:
  criterion: |
    The joke applies a framework, set of rules, or mode of reasoning
    from one domain to a situation where it doesn't belong. The humor
    is in the misapplication. Unlike reframe, the punchline doesn't
    shift reading within the setup's domain — it imports a foreign
    framework.

  positive_example: |
    Treating a friendship as if it were a corporate relationship
    (PTO for emotional labor, quarterly reviews of the bond). The
    framework of corporate HR is imported into a domain (friendship)
    where it doesn't fit, and the mismatch is the joke.

  negative_example: |
    "I used to do drugs. I still do, but I used to, too." — NOT a
    category_error. No framework is being imported from elsewhere;
    the joke operates entirely within the domain of personal history.
    This is REVERSAL.

  distinguished_from:
    reframe: |
      See reframe's distinguished_from.

    false_equivalence: |
      False_equivalence treats two unequal things as equivalent within
      a single comparative move. Category_error applies a framework
      across domains. Test: is the joke making a two-thing comparison
      (false_equivalence) or applying a rule-set inappropriately
      (category_error)?

figuration:
  criterion: |
    The setup uses literal language or a literal reading of a
    situation; the punchline imposes a figurative reading that
    wasn't signaled. Opposite direction from literalization.

  positive_example: |
    "My therapist says I have a preoccupation with vengeance. We'll
    see about that." (Stewart Lee, approximate)
    Setup ("has a preoccupation with vengeance") is a literal clinical
    statement. Punchline ("we'll see about that") re-reads the
    statement's conversational convention figuratively as a vengeance
    threat, demonstrating the very thing being diagnosed.

  negative_example: |
    "I haven't slept for ten days..." — NOT figuration. This goes from
    figurative (idiom) to literal. Figuration goes the other way.

  distinguished_from:
    literalization: |
      Figuration and literalization are mirror images. Literalization
      is figurative → literal. Figuration is literal → figurative.
      They share almost all other properties.

    reframe: |
      Figuration is a subset of reframe (specifically the
      literal-to-figurative subset). Use figuration when the reading-
      mode switch is specifically in that direction; reframe for other
      interpretation shifts.
